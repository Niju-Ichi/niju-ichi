<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIJU ICHI</title>
<link rel="stylesheet" href="shared/css/base.css">
<script src="shared/js/i18n.js"></script>
<script src="shared/lang/en.js"></script>
<script src="shared/lang/de.js"></script>
<script src="shared/lang/ja.js"></script>
<script src="shared/js/modules.js"></script>
</head>
<body class="launch-body">
  <!-- Full-bleed hero (start-hero.png). The module cards + orange buttons are part
       of the artwork; we overlay the clickable "Open" links exactly on the orange
       buttons, the language buttons on the dark top-right area, and two horizontal
       flow arrows between the bottom modules. Image is never modified. -->
  <div class="launch-hero" id="hero">
    <img src="shared/img/start-hero.png" alt="NIJU ICHI — Company Brain · Sovereign Processes" draggable="false">
    <div class="hero-arrows" id="heroArrows"></div>
    <div class="hero-spots" id="heroSpots"></div>
    <div class="launch-lang" id="langWrap"></div>
  </div>

<script>
/* Click targets over the orange buttons drawn into the hero. Position in % of the
   hero (scales 1:1 with the image): x/y = top-left corner, w/h = size. */
var SPOTS = {
  brain:      { x: 54.31, y: 66.52, w: 6.22, h: 4.14 },
  builder:    { x: 27.99, y: 84.38, w: 5.80, h: 3.93 },
  management: { x: 54.19, y: 84.27, w: 5.74, h: 4.04 },
  hub:        { x: 79.67, y: 84.27, w: 5.68, h: 4.04 }
};
/* Two horizontal flow arrows in the gaps of the bottom module row (% of hero). */
var ARROWS = [ { x: 37.0, y: 86.3 }, { x: 64.0, y: 86.3 } ];
/* Launcher language order: Japanese, German, English. */
var LANG_ORDER = ["ja", "de", "en"];

function modById(id) { return NIJU.MODS.list().filter(function (m) { return m.id === id; })[0] || null; }

/* Clickable "Open" overlays on the drawn orange buttons. */
function zeichneSpots() {
  var host = document.getElementById("heroSpots");
  host.innerHTML = "";
  Object.keys(SPOTS).forEach(function (id) {
    var m = modById(id); if (!m) return;
    var p = SPOTS[id];
    var a = document.createElement(m.enabled ? "a" : "span");
    a.className = "hero-spot" + (m.enabled ? "" : " disabled");
    if (m.enabled) a.href = NIJU.MODS.href(m, "root");
    a.style.left = p.x + "%"; a.style.top = p.y + "%"; a.style.width = p.w + "%"; a.style.height = p.h + "%";
    a.setAttribute("aria-label", NIJU.I18N.t(m.key) + " — " + NIJU.I18N.t("launcher.open"));
    var lab = document.createElement("span");
    lab.className = "spot-open";
    lab.textContent = m.enabled ? (NIJU.I18N.t("launcher.open") + " →") : NIJU.I18N.t("launcher.comingSoon");
    a.appendChild(lab);
    host.appendChild(a);
  });
}

/* Two horizontal flow arrows (brand orange) between the bottom modules. */
function zeichneArrows() {
  var host = document.getElementById("heroArrows");
  host.innerHTML = "";
  ARROWS.forEach(function (p) {
    var d = document.createElement("div");
    d.className = "hero-arrow"; d.setAttribute("aria-hidden", "true");
    d.style.left = p.x + "%"; d.style.top = p.y + "%";
    d.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12 H19 M15.4 8.4 L19 12 L15.4 15.6"/></svg>';
    host.appendChild(d);
  });
}

function zeichneSprachen() {
  var w = document.getElementById("langWrap");
  w.innerHTML = "";
  var verfuegbar = NIJU.I18N.langs();
  var sortiert = verfuegbar.slice().sort(function (a, b) {
    var ia = LANG_ORDER.indexOf(a.code), ib = LANG_ORDER.indexOf(b.code);
    if (ia < 0) ia = 99; if (ib < 0) ib = 99;
    return ia - ib;
  });
  sortiert.forEach(function (L) {
    var b = document.createElement("button");
    b.textContent = L.name;
    if (L.code === NIJU.I18N.get()) b.className = "aktiv";
    b.addEventListener("click", function () { NIJU.I18N.setLang(L.code); });
    w.appendChild(b);
  });
}

NIJU.I18N.init();
NIJU.I18N.onChange(function () { zeichneSpots(); zeichneSprachen(); });
zeichneArrows();
zeichneSpots();
zeichneSprachen();
</script>
</body>
</html>
