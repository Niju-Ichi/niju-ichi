/* List body: one single-line input per point, sub-points indented one level.
   Editing is keyboard-first (§5.5); a single ghost "+ point" sits at the end. */
/* Shared point-list body — used by the detail page (a list block's items) AND
   the overview (a step's bullet points). `liste` = the points array; `listid`
   uniquely identifies the list ("d:<bi>:<ti>" | "o:<si>"). Keyboard-first
   editing (§5.5); a single ghost "+ point" sits at the end. */
function listenKoerper(body, liste, listid) {
  liste.forEach(function (li, lii) {
    body.appendChild(punktRow(liste, listid, lii, null));
    const unter = (typeof li === "object" && li && li.unterpunkte) ? li.unterpunkte : [];
    unter.forEach(function (u, ui) { body.appendChild(punktRow(liste, listid, lii, ui)); });
  });
  const ghost = el("button", "ed-ghost"); ghost.type = "button";
  ghost.appendChild(ic("ic-plus")); ghost.appendChild(el("span", null, t("editor.addPoint")));
  ghost.appendChild(el("span", "kbd", "Enter"));
  ghost.addEventListener("click", function (e) {
    e.preventDefault();
    liste.push(""); nachFokus({ listid: listid, lii: liste.length - 1, ui: "x", caret: 0 });
  });
  body.appendChild(ghost);
}

/* One editable point row. ui == null → top-level item, else a sub-point. */
function punktRow(liste, listid, lii, ui) {
  const istSub = (ui != null);
  const row = el("div", "ed-row" + (istSub ? " ed-sub" : ""));
  const inp = document.createElement("input");
  inp.type = "text"; inp.className = "grow";
  inp.value = istSub ? (liste[lii].unterpunkte[ui] || "") : itemText(liste[lii]);
  inp.dataset.listid = listid; inp.dataset.lii = lii; inp.dataset.ui = (ui == null ? "x" : ui);
  inp.addEventListener("input", function () {
    if (istSub) liste[lii].unterpunkte[ui] = inp.value;
    else { const cur = liste[lii]; if (typeof cur === "object" && cur) cur.text = inp.value; else liste[lii] = inp.value; }
    render(STATE.daten);
  });
  inp.addEventListener("keydown", function (e) { punktTaste(e, inp, liste, listid, lii, ui); });
  row.appendChild(inp);

  const tools = el("div", "ed-tools");
  const grip = iconBtn("ic-grip", t("editor.dragMove"), null, { reveal: true, grip: true });
  tools.appendChild(grip);
  /* Drag among siblings only: top-level points share one group, a parent's
     sub-points share their own group (sub-points never cross parents, §5.4). */
  dragWire(grip, row, istSub ? ("sub:" + listid + ":" + lii) : ("pts:" + listid), istSub ? ui : lii,
    function (from, to) { arrVerschieben(istSub ? liste[lii].unterpunkte : liste, from, to); nachStruktur(); });
  if (!istSub && lii > 0) tools.appendChild(iconBtn("ic-indent", t("editor.makeSubpoint"), function () { punktEinruecken(liste, listid, lii); }, { reveal: true }));
  tools.appendChild(iconBtn("ic-trash", t("editor.remove"), function () { punktLoeschen(liste, listid, lii, ui, true); }, { reveal: true }));
  const moreB = iconBtn("ic-dots-vertical", t("editor.more"), function () {
    oeffnePop(moreB, [
      { icon: "ic-arrow-up", label: t("editor.moveUp"), onClick: function () { punktBewegen(liste, listid, lii, ui, -1); } },
      { icon: "ic-arrow-down", label: t("editor.moveDown"), onClick: function () { punktBewegen(liste, listid, lii, ui, 1); } },
      { icon: "ic-duplicate", label: t("editor.duplicate"), onClick: function () { punktDuplizieren(liste, listid, lii, ui); } },
      "-",
      { icon: "ic-trash", label: t("editor.remove"), onClick: function () { punktLoeschen(liste, listid, lii, ui, false); } }
    ]);
  }, { reveal: true });
  tools.appendChild(moreB);
  row.appendChild(tools);
  return row;
}

/* ----- Point operations (keyboard model §5.5 + ⋯ menu). All mutate `liste`
   and rebuild via nachFokus so focus lands on the intended cell. ----- */
function punktBewegen(liste, listid, lii, ui, dir) {
  if (ui == null) {
    const j = lii + dir; if (j < 0 || j >= liste.length) return;
    const x = liste[lii]; liste[lii] = liste[j]; liste[j] = x; nachFokus({ listid: listid, lii: j, ui: "x", caret: null });
  } else {
    const a = liste[lii].unterpunkte, j = ui + dir; if (j < 0 || j >= a.length) return;
    const x = a[ui]; a[ui] = a[j]; a[j] = x; nachFokus({ listid: listid, lii: lii, ui: j, caret: null });
  }
}
function punktLoeschen(liste, listid, lii, ui, fokusVorig) {
  const prev = fokusVorig ? vorigeZeile(liste, lii, ui) : null;
  if (ui == null) liste.splice(lii, 1);
  else { liste[lii].unterpunkte.splice(ui, 1); if (!liste[lii].unterpunkte.length) delete liste[lii].unterpunkte; }
  if (prev) nachFokus({ listid: listid, lii: prev.lii, ui: prev.ui, caret: null });
  else nachStruktur();
}
function punktDuplizieren(liste, listid, lii, ui) {
  if (ui == null) { liste.splice(lii + 1, 0, klonTeil(liste[lii])); nachFokus({ listid: listid, lii: lii + 1, ui: "x", caret: null }); }
  else { const a = liste[lii].unterpunkte; a.splice(ui + 1, 0, a[ui]); nachFokus({ listid: listid, lii: lii, ui: ui + 1, caret: null }); }
}
/* Indent a top-level item to become sub-point(s) of the previous item (max 2 levels). */
function punktEinruecken(liste, listid, lii) {
  if (lii <= 0) return;
  const cur = liste[lii], text = itemText(cur);
  const ownSubs = (typeof cur === "object" && cur && cur.unterpunkte) ? cur.unterpunkte.slice() : [];
  let prev = liste[lii - 1];
  if (typeof prev !== "object" || !prev) { prev = { text: prev || "" }; liste[lii - 1] = prev; }
  if (!prev.unterpunkte) prev.unterpunkte = [];
  const at = prev.unterpunkte.length;
  prev.unterpunkte.push(text);
  ownSubs.forEach(function (u) { prev.unterpunkte.push(u); });
  liste.splice(lii, 1);
  nachFokus({ listid: listid, lii: lii - 1, ui: at, caret: null });
}
/* Outdent a sub-point back to a top-level item right after its parent. */
function punktAusruecken(liste, listid, lii, ui) {
  const parent = liste[lii];
  if (typeof parent !== "object" || !parent || !parent.unterpunkte) return;
  const text = parent.unterpunkte[ui];
  parent.unterpunkte.splice(ui, 1);
  if (!parent.unterpunkte.length) delete parent.unterpunkte;
  liste.splice(lii + 1, 0, text);
  nachFokus({ listid: listid, lii: lii + 1, ui: "x", caret: null });
}
function punktTaste(e, inp, liste, listid, lii, ui) {
  if (e.key === "Enter") {
    e.preventDefault();
    if (ui == null) { liste.splice(lii + 1, 0, ""); nachFokus({ listid: listid, lii: lii + 1, ui: "x", caret: 0 }); }
    else { liste[lii].unterpunkte.splice(ui + 1, 0, ""); nachFokus({ listid: listid, lii: lii, ui: ui + 1, caret: 0 }); }
  } else if (e.key === "Tab" && !e.shiftKey) {
    if (ui == null && lii > 0) { e.preventDefault(); punktEinruecken(liste, listid, lii); }
  } else if (e.key === "Tab" && e.shiftKey) {
    if (ui != null) { e.preventDefault(); punktAusruecken(liste, listid, lii, ui); }
  } else if (e.key === "Backspace" && inp.value === "") {
    if (ui == null) {
      const cur = liste[lii];
      if (typeof cur === "object" && cur && cur.unterpunkte && cur.unterpunkte.length) return;  /* keep a parent that still has sub-points */
    }
    e.preventDefault();
    punktLoeschen(liste, listid, lii, ui, true);
  } else if (e.altKey && (e.key === "ArrowUp" || e.key === "ArrowDown")) {
    e.preventDefault();
    punktBewegen(liste, listid, lii, ui, e.key === "ArrowUp" ? -1 : 1);
  }
}

/* ----- RACI-Popover (Vorschau) ----- */
function schliesseRaciMenu() {
  const m = document.querySelector(".raci-menu");
  if (m) m.remove();
  document.removeEventListener("click", schliesseRaciMenu);
}
function toggleRaci(stepId, rolle, letter) {
  const d = STATE.daten;
  if (!d.raci) d.raci = {};
  const zeile = d.raci[stepId] || (d.raci[stepId] = {});
  let arr = zeile[rolle] ? zeile[rolle].slice() : [];
  if (arr.includes(letter)) arr = arr.filter(x => x !== letter);
  else arr.push(letter);
  arr.sort((a, b) => RACI_REIHENFOLGE.indexOf(a) - RACI_REIHENFOLGE.indexOf(b));
  if (arr.length) zeile[rolle] = arr; else delete zeile[rolle];
  render(d);
}
function oeffneRaciMenu(zelle, stepId, rolle) {
  schliesseRaciMenu();
  const d = STATE.daten;
  const menu = el("div", "raci-menu");
  RACI_REIHENFOLGE.forEach(b => {
    const btn = el("button", "rm-btn rm-" + b, raciLabel(b));
    const aktiv = d.raci && d.raci[stepId] && d.raci[stepId][rolle] && d.raci[stepId][rolle].includes(b);
    if (aktiv) btn.classList.add("an");
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleRaci(stepId, rolle, b);
      btn.classList.toggle("an");
    });
    menu.appendChild(btn);
  });
  menu.addEventListener("click", (e) => e.stopPropagation());
  document.body.appendChild(menu);
  const r = zelle.getBoundingClientRect();
  let left = r.left, top = r.bottom + 6;
  const mw = menu.offsetWidth, mh = menu.offsetHeight;
  if (left + mw > window.innerWidth - 8) left = window.innerWidth - 8 - mw;
  if (top + mh > window.innerHeight - 8) top = r.top - 6 - mh;
  menu.style.left = Math.max(8, left) + "px";
  menu.style.top = Math.max(8, top) + "px";
  setTimeout(() => document.addEventListener("click", schliesseRaciMenu), 0);
}

/* ---- Zuletzt benutzte Speicherorte merken (FileSystem-Handle in IndexedDB) ----
   Separate Schlüssel für Prozesse ("proc") und Templates ("tpl"), damit der
   Speichern-Dialog beim nächsten Mal wieder im passenden Ordner aufgeht.
   Alles defensiv: schlägt etwas fehl (z. B. file://-IndexedDB), läuft die
   Funktion ohne Merken weiter. */
function idbHandleLaden(key) {
  return new Promise(res => {
    try {
      const r = indexedDB.open("niju", 1);
      r.onupgradeneeded = () => { try { r.result.createObjectStore("handles"); } catch (e) {} };
      r.onsuccess = () => {
        try {
          const req = r.result.transaction("handles", "readonly").objectStore("handles").get(key);
          req.onsuccess = () => res(req.result || null);
          req.onerror = () => res(null);
        } catch (e) { res(null); }
      };
      r.onerror = () => res(null);
    } catch (e) { res(null); }
  });
}
function idbHandleSpeichern(key, val) {
  try {
    const r = indexedDB.open("niju", 1);
    r.onupgradeneeded = () => { try { r.result.createObjectStore("handles"); } catch (e) {} };
    r.onsuccess = () => { try { r.result.transaction("handles", "readwrite").objectStore("handles").put(val, key); } catch (e) {} };
  } catch (e) {}
}

/* Klassischer Download in den Download-Ordner (Fallback). */
function downloadJson(txt, name) {
  const blob = new Blob([txt], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* Speichern über den Datei-Dialog (File System Access API, wo verfügbar).
   startIn = zuletzt gespeicherte Datei desselben Typs → Dialog öffnet im
   gemerkten Ordner. Rückgabe: true = erledigt (gespeichert ODER abgebrochen),
   false = API nicht verfügbar → Aufrufer soll downloaden. */
async function speichereMitDialog(txt, suggestedName, key) {
  if (!window.showSaveFilePicker) return false;
  const opts = { suggestedName: suggestedName, types: [{ description: "JSON", accept: { "application/json": [".json"] } }] };
  try { const last = await idbHandleLaden(key); if (last) opts.startIn = last; } catch (e) {}
  try {
    const handle = await window.showSaveFilePicker(opts);
    const w = await handle.createWritable();
    await w.write(txt);
    await w.close();
    idbHandleSpeichern(key, handle);   /* Ordner für nächstes Mal merken */
    return true;
  } catch (e) {
    if (e && e.name === "AbortError") return true;   /* Nutzer hat abgebrochen */
    return false;                                    /* sonst Download-Fallback */
  }
}

/* ============================================================
   JPEG-Export (offline, ohne Bibliothek)
   Das Blatt wird über ein SVG-<foreignObject> in ein Bild gerendert
   (kein fetch/D3/html2canvas) und auf einer Canvas in der gewünschten
   Pixelgröße als JPEG ausgegeben. Die DPI-Zahl wird in den JFIF-Header
   geschrieben (Druckauflösung). Speicherort: File-System-Access-Dialog,
   sonst klassischer Download.
   ============================================================ */
function jpegName() {
  const m = (STATE.daten && STATE.daten.meta) || {};
  let basis = m.prozessId || m.titel || "prozess";
  basis = basis.toLowerCase().replace(/[^a-z0-9äöüß]+/gi, "-").replace(/^-+|-+$/g, "");
  return (basis || "prozess") + (STATE.ansicht === "detail" ? "-detail" : "") + ".jpg";
}

/* Alle Seiten-CSS einsammeln: die eingebetteten <style>-Blöcke (enthalten das
   komplette Blatt-Layout inkl. ::before-Aufzählungspunkte) + die aktiven
   Design-Variablen von :root. base.css (nur Toolbar/Chrome) wird nicht benötigt. */
function sammleSeitenCss() {
  let css = "";
  document.querySelectorAll("style").forEach(s => { css += s.textContent + "\n"; });
  const rs = getComputedStyle(document.documentElement);
  const vars = ["--ink","--paper","--muted","--akzent","--rule","--rule-mid","--rule-strong",
    "--sidebar","--body","--zebra","--verbinder","--num-soft","--sans","--mono",
    "--raci-R","--raci-R-text","--raci-A","--raci-A-text","--raci-C","--raci-C-text","--raci-I","--raci-I-text"];
  let root = ":root{";
  vars.forEach(v => { const val = rs.getPropertyValue(v); if (val) root += v + ":" + val + ";"; });
  root += "}";
  return root + "\n" + css;
}

/* Rendert das aktuelle Blatt als JPEG-Blob in (outW × outH) Pixeln. */
function blattAlsJpeg(outW, outH, dpi, quality) {
  return new Promise((resolve, reject) => {
    const blatt = document.getElementById("blatt");
    if (!blatt) { reject(new Error("no sheet")); return; }
    const natW = blatt.offsetWidth, natH = blatt.offsetHeight;

    /* Klon ohne Bildschirm-Transform/Schatten, an 0/0 in natürlicher Größe */
    const klon = blatt.cloneNode(true);
    klon.style.transform = "none";
    klon.style.boxShadow = "none";
    klon.style.margin = "0";
    klon.style.position = "static";
    klon.style.width = natW + "px";

    const wrap = document.createElement("div");
    wrap.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
    wrap.style.width = natW + "px"; wrap.style.height = natH + "px"; wrap.style.background = "#ffffff";
    const styleEl = document.createElement("style");
    styleEl.textContent = sammleSeitenCss();
    wrap.appendChild(styleEl);
    wrap.appendChild(klon);

    const xhtml = new XMLSerializer().serializeToString(wrap);
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + natW + '" height="' + natH + '">' +
                '<foreignObject x="0" y="0" width="' + natW + '" height="' + natH + '">' + xhtml +
                '</foreignObject></svg>';
    const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);

    const img = new Image();
    img.onload = function () {
      try {
        const cv = document.createElement("canvas");
        cv.width = outW; cv.height = outH;
        const ctx = cv.getContext("2d");
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, outW, outH);
        ctx.drawImage(img, 0, 0, outW, outH);
        cv.toBlob(function (blob) {
          if (!blob) { reject(new Error("toBlob failed")); return; }
          blob.arrayBuffer().then(buf => {
            const bytes = setJpegDpi(new Uint8Array(buf), dpi);
            resolve(new Blob([bytes], { type: "image/jpeg" }));
          }).catch(reject);
        }, "image/jpeg", quality);
      } catch (e) { reject(e); }
    };
    img.onerror = function () { reject(new Error("SVG image load failed")); };
    img.src = url;
  });
}

/* DPI in den JFIF-APP0-Header schreiben (units=1 = dots per inch). */
function setJpegDpi(bytes, dpi) {
  if (bytes[0] !== 0xFF || bytes[1] !== 0xD8) return bytes; /* kein JPEG */
  for (let i = 2; i < bytes.length - 1; i++) {
    if (bytes[i] === 0xFF && bytes[i + 1] === 0xE0) { /* APP0 */
      const seg = i + 4; /* nach Marker(2)+Länge(2): "JFIF\0"(5) version(2) units(1) X(2) Y(2) */
      if (bytes[seg] === 0x4A && bytes[seg + 1] === 0x46 && bytes[seg + 2] === 0x49 && bytes[seg + 3] === 0x46) {
        const u = seg + 7;
        bytes[u] = 1;                          /* units = DPI */
        bytes[u + 1] = (dpi >> 8) & 0xFF; bytes[u + 2] = dpi & 0xFF;   /* Xdensity */
        bytes[u + 3] = (dpi >> 8) & 0xFF; bytes[u + 4] = dpi & 0xFF;   /* Ydensity */
      }
      break;
    }
  }
  return bytes;
}

/* Blob über den Datei-Dialog speichern (FSA), sonst Download. */
async function speichereBlobMitDialog(blob, suggestedName, key) {
  if (window.showSaveFilePicker) {
    const opts = { suggestedName: suggestedName, types: [{ description: "JPEG", accept: { "image/jpeg": [".jpg", ".jpeg"] } }] };
    try { const last = await idbHandleLaden(key); if (last) opts.startIn = last; } catch (e) {}
    try {
      const handle = await window.showSaveFilePicker(opts);
      const w = await handle.createWritable(); await w.write(blob); await w.close();
      idbHandleSpeichern(key, handle);
      return true;
    } catch (e) { if (e && e.name === "AbortError") return true; /* sonst Download */ }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = suggestedName;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  return true;
}

/* Dialog: Breite/Höhe (px) + DPI, dann exportieren + Speicherort wählen. */
function zeigeJpegDialog() {
  if (!STATE.daten) { alert(t("msg.noSaveData")); return; }
  const blatt = document.getElementById("blatt");
  if (!blatt) { alert(t("msg.invalidData")); return; }
  const natW = Math.round(blatt.offsetWidth), natH = Math.round(blatt.offsetHeight);
  const ratio = natW / natH;
  const alt = document.getElementById("jpegOverlay"); if (alt) alt.remove();

  const overlay = el("div", "import-overlay"); overlay.id = "jpegOverlay";
  const dialog = el("div", "import-dialog"); dialog.style.width = "min(440px, 94vw)";
  const kopf = el("div", "import-kopf");
  kopf.appendChild(el("h2", null, t("jpeg.title")));
  kopf.appendChild(el("p", null, t("jpeg.intro")));
  dialog.appendChild(kopf);

  const body = el("div", "import-body");
  function num(labelKey, val) {
    const f = el("div", "ed-field"); f.style.marginBottom = "12px";
    f.appendChild(el("label", null, t(labelKey)));
    const inp = document.createElement("input"); inp.type = "number"; inp.min = "1"; inp.value = String(val);
    f.appendChild(inp); body.appendChild(f); return inp;
  }
  const inW = num("jpeg.width", natW);
  const inH = num("jpeg.height", natH);
  const inDpi = num("jpeg.dpi", 150);
  inDpi.min = "1";
  const inQ = num("jpeg.quality", 92); inQ.min = "10"; inQ.max = "100";

  /* Seitenverhältnis koppeln */
  const ratioWrap = el("label", "ed-check");
  const chk = document.createElement("input"); chk.type = "checkbox"; chk.checked = true;
  ratioWrap.appendChild(chk); ratioWrap.appendChild(document.createTextNode(" " + t("jpeg.keepRatio")));
  body.appendChild(ratioWrap);
  inW.addEventListener("input", () => { if (chk.checked) { const w = parseFloat(inW.value); if (w > 0) inH.value = String(Math.round(w / ratio)); } });
  inH.addEventListener("input", () => { if (chk.checked) { const h = parseFloat(inH.value); if (h > 0) inW.value = String(Math.round(h * ratio)); } });
  dialog.appendChild(body);

  const fuss = el("div", "import-fuss");
  const hinweis = el("div", "summe"); fuss.appendChild(hinweis);
  const abbrechen = el("button", "btn-sek", t("jpeg.cancel"));
  abbrechen.addEventListener("click", () => overlay.remove());
  const exportieren = el("button", "btn-akt", t("jpeg.export"));
  exportieren.addEventListener("click", async () => {
    const w = parseInt(inW.value, 10), h = parseInt(inH.value, 10), dpi = parseInt(inDpi.value, 10);
    let q = parseInt(inQ.value, 10); if (!(q > 0)) q = 92; q = Math.max(10, Math.min(100, q));
    if (!(w > 0) || !(h > 0) || !(dpi > 0)) { alert(t("jpeg.badSize")); return; }
    exportieren.disabled = true; abbrechen.disabled = true; hinweis.textContent = t("jpeg.rendering");
    try {
      const blob = await blattAlsJpeg(w, h, dpi, q / 100);
      overlay.remove();
      await speichereBlobMitDialog(blob, jpegName(), "jpeg");
    } catch (e) {
      exportieren.disabled = false; abbrechen.disabled = false; hinweis.textContent = "";
      alert(t("jpeg.failed", { err: (e && e.message) || String(e) }));
    }
  });
  fuss.appendChild(abbrechen); fuss.appendChild(exportieren);
  dialog.appendChild(fuss);

  overlay.appendChild(dialog);
  document.body.appendChild(overlay);
}

/* ============================================================
   HTML-Export (offline, statisch — ohne JavaScript zum Anzeigen)
   Erzeugt EINE in sich geschlossene .html-Datei: Prozessübersicht +
   ALLE Detailseiten, fertig gerendert wie im NIJU-Viewer. Kein JS, kein
   Nachladen — Blatt-CSS inline, Logos als Data-URL, RACI-Verbinder als
   eingebackenes SVG, das aktive Design als :root-Variablen. Zusätzlich ist
   die Original-JSON eingebettet (verlustfreier Rück-Import). Jede Seite wird
   als ECHTES HTML ausgegeben (KEIN SVG-<foreignObject> — das verrutscht in
   Safari/Firefox/Chrome, v. a. Badges + Verbinder) → rendert 1:1 mit der CSS-
   Engine wie im Viewer. Ein winziges Inline-Skript skaliert jede Seite per
   transform:scale auf die Spaltenbreite (wie der Viewer-„fit"); ohne Skript
   zeigt sie sich in natürlicher Größe (scrollbar) — Inhalt bleibt vollständig.
   Einbetten: Datei anhängen und per iframe einbinden, oder standalone öffnen.
   ============================================================ */
function htmlName(daten) {
  const m = ((daten || STATE.daten) || {}).meta || {};
  let basis = m.prozessId || m.titel || "prozess";
  basis = basis.toLowerCase().replace(/[^a-z0-9äöüß]+/gi, "-").replace(/^-+|-+$/g, "");
  return (basis || "prozess") + ".html";
}

/* Aktuelles #blatt klonen → HTML-String. KEINE festen Pixel-Maße einbacken:
   das Blatt behält seine mm-Breite (über Browser konstant) und natürliche Höhe.
   Größe + Verbinder werden im Export pro Browser frisch gemessen/gezeichnet —
   so passen Layout und RACI-Linien überall (auch Safari), nicht nur im Browser,
   in dem exportiert wurde. */
function blattSeiteSerialisieren() {
  const blatt = document.getElementById("blatt");
  const klon = blatt.cloneNode(true);
  klon.style.transform = "none";
  klon.style.boxShadow = "none";
  klon.style.margin = "0";
  /* relative (NICHT static): #verbinder ist position:absolute;inset:0 und muss
     das Blatt als positionierten Vorfahren überlagern (sonst verrutschen die
     RACI-Verbinderlinien). top/left=0 = normaler Fluss-Platz. */
  klon.style.position = "relative";
  klon.style.left = "0"; klon.style.top = "0";
  return klon.outerHTML;
}

/* Vollständiges, statisches HTML-Dokument bauen (Übersicht + alle Details).
   zielDaten = zu exportierender Prozess (Default: aktueller). Für den Stapel
   wird STATE.daten kurz auf den Zielprozess umgeschaltet und danach wieder
   zurückgesetzt — der Editor-Zustand bleibt unverändert. */
function baueHtmlDokument(zielDaten) {
  const daten = zielDaten || STATE.daten;
  const sichern = { daten: STATE.daten, ansicht: STATE.ansicht, idx: STATE.detailIndex, bearb: STATE.bearbeiten };
  STATE.daten = daten;
  STATE.bearbeiten = false;   /* read-only Look (keine Editier-Affordances) */

  const seiten = [];
  /* Übersicht */
  STATE.ansicht = "uebersicht";
  render(daten); zeichneVerbinder();
  seiten.push(blattSeiteSerialisieren());
  /* alle Detailseiten */
  const n = (daten.schritte || []).length;
  for (let i = 0; i < n; i++) {
    STATE.ansicht = "detail"; STATE.detailIndex = i;
    render(daten); zeichneVerbinder();
    seiten.push(blattSeiteSerialisieren());
  }

  /* ALLES, was den Live-Zustand liest (Design am :root, body-Klassen, JSON des
     Zielprozesses), VOR dem Restore erfassen — sonst bekäme der Stapel das
     Design/JSON des falschen (zurückgesetzten) Prozesses. */
  const sheetCss = sammleSeitenCss();
  const optClasses = Array.from(document.body.classList).filter(c => /^opt-/.test(c)).join(" ");
  const rs = getComputedStyle(document.documentElement);
  const designVars = ["--ink","--paper","--muted","--akzent","--rule","--rule-mid","--rule-strong",
    "--sidebar","--body","--zebra","--verbinder","--num-soft","--sans","--mono",
    "--raci-R","--raci-R-text","--raci-A","--raci-A-text","--raci-C","--raci-C-text","--raci-I","--raci-I-text"];
  let rootStyle = "";
  designVars.forEach(v => { const val = rs.getPropertyValue(v); if (val) rootStyle += v + ":" + val.trim() + ";"; });
  /* Original-JSON als Daten-Insel (nicht ausgeführt) → Rück-Import / Datenträger */
  const jsonText = baueJsonText().replace(/<\//g, "<\\/");

  /* Zustand wiederherstellen (Daten + Ansicht) */
  STATE.daten = sichern.daten; STATE.bearbeiten = sichern.bearb;
  setAnsicht(sichern.ansicht === "detail" ? "detail" : "uebersicht", sichern.idx);

  /* Design-Options-Regeln (liegen sonst in base.css = Chrome, hier nicht geladen) */
  const optRules =
    "body.opt-no-connectors #verbinder{display:none!important}" +
    "body.opt-badge-round .badge,body.opt-badge-round .bb-badge{border-radius:50%}" +
    "body.opt-no-zebra .rrow-1 .raci-zelle,body.opt-no-zebra .raci-zelle.rrow-1," +
    "body.opt-no-zebra .rrow-1.raci-rolle,body.opt-no-zebra .rm-rolle.stripe," +
    "body.opt-no-zebra .rm-zelle.stripe{background:transparent!important}";
  /* Dokument-Layout. WICHTIG: das eingebettete Builder-CSS setzt
     body{height:100vh;overflow:hidden;display:flex} (App-Shell) — unten
     überschrieben. .niju-doc-scale = inline-block, schrumpft auf die natürliche
     Blattgröße; das Skript skaliert sie per transform und setzt die Seitengröße.
     Ohne Skript: natürliche Größe, .niju-doc-page scrollt statt zu beschneiden. */
  const docCss =
    "html{margin:0;padding:0}" +
    "body{margin:0;padding:0;display:block;height:auto;min-height:0;overflow:visible;" +
      "background:#e9ecef;font-family:var(--sans,\"Helvetica Neue\",Arial,sans-serif)}" +
    ".niju-doc{display:block;box-sizing:border-box;max-width:1200px;margin:0 auto;padding:20px 14px 44px}" +
    ".niju-doc-page{box-sizing:content-box;margin:0 auto 22px;background:var(--paper,#fff);" +
      "box-shadow:0 6px 22px rgba(15,23,42,.20);border-radius:4px;overflow:auto}" +
    ".niju-doc-page:last-child{margin-bottom:0}" +
    ".niju-doc-scale{display:inline-block;vertical-align:top;transform-origin:top left}" +
    "@media print{body{background:#fff}@page{size:A3 landscape;margin:6mm}" +
    ".niju-doc{max-width:none;margin:0;padding:0}" +
    ".niju-doc-page{margin:0;width:auto!important;height:auto!important;overflow:visible;" +
    "box-shadow:none;border-radius:0;break-after:page}" +
    ".niju-doc-page:last-child{break-after:auto}" +
    ".niju-doc-scale{transform:none!important}}";
  const css = sheetCss + "\n" + optRules + "\n" + docCss;

  const seitenHtml = seiten.map(h =>
    '<div class="niju-doc-page"><div class="niju-doc-scale">' + h + '</div></div>'
  ).join("\n");

  /* Inline-Skript: (1) zeichnet die RACI-Verbinder im Export-Browser NEU gegen
     die echten Badge-Positionen (1:1, in jedem Browser deckungsgleich), (2)
     skaliert jede Seite per transform:scale auf die Spaltenbreite (wie der
     Viewer-„fit"). Wird bei jedem fit() in natürlicher Größe gemessen → robust
     gegen Font-/Reflow-Unterschiede. Inhalt steht auch ohne das Skript. */
  const fitScript =
    '<script>(function(){' +
    'var NS="http://www.w3.org/2000/svg";' +
    'function draw(blatt){' +
      'var svg=blatt.querySelector("#verbinder");if(!svg)return;' +
      'var ref=svg.parentNode;while(svg.firstChild)svg.removeChild(svg.firstChild);' +
      'var w=ref.clientWidth,h=ref.clientHeight;' +
      'svg.setAttribute("viewBox","0 0 "+w+" "+h);svg.setAttribute("preserveAspectRatio","none");' +
      'var rr=ref.getBoundingClientRect();' +
      'function L(a,b,c,d){var l=document.createElementNS(NS,"line");l.setAttribute("x1",a);l.setAttribute("y1",b);l.setAttribute("x2",c);l.setAttribute("y2",d);svg.appendChild(l);}' +
      'function E(a,b,c,d){if(Math.abs(b-d)<0.5){L(a,b,c,d);return;}var xm=(a+c)/2;L(a,b,xm,b);L(xm,b,xm,d);L(xm,d,c,d);}' +
      'function C(el){var r=el.getBoundingClientRect();return{x:r.left+r.width/2-rr.left,y:r.top+r.height/2-rr.top};}' +
      'function tree(bs){var cs=[],is=[],R=null,A=null,i;' +
        'for(i=0;i<bs.length;i++){var p=C(bs[i]),l=bs[i].getAttribute("data-letter");' +
          'if(l==="C")cs.push(p);else if(l==="I")is.push(p);else if(l==="R")R=p;else if(l==="A")A=p;}' +
        'cs.sort(function(a,b){return a.y-b.y;});is.sort(function(a,b){return a.y-b.y;});' +
        'var xC=cs.length?cs[0].x:null,xI=is.length?is[0].x:null,cE=[],iE=[],prev=null;' +
        'if(xC!=null)prev={k:"col",x:xC,e:cE};' +
        'if(R){if(prev&&prev.k==="col"){L(prev.x,R.y,R.x,R.y);prev.e.push(R.y);}prev={k:"pt",x:R.x,y:R.y};}' +
        'if(A){if(prev&&prev.k==="pt")E(prev.x,prev.y,A.x,A.y);else if(prev&&prev.k==="col"){L(prev.x,A.y,A.x,A.y);prev.e.push(A.y);}prev={k:"pt",x:A.x,y:A.y};}' +
        'if(xI!=null){if(prev&&prev.k==="pt"){L(prev.x,prev.y,xI,prev.y);iE.push(prev.y);}else if(prev&&prev.k==="col"){var y=cs[0].y;L(prev.x,y,xI,y);iE.push(y);prev.e.push(y);}}' +
        'function V(items,x,e){if(x==null)return;var ys=[],i;for(i=0;i<items.length;i++)ys.push(items[i].y);ys=ys.concat(e);if(ys.length<2)return;var y1=Math.min.apply(null,ys),y2=Math.max.apply(null,ys);if(y2-y1>0.5)L(x,y1,x,y2);}' +
        'V(cs,xC,cE);V(is,xI,iE);}' +
      'if(blatt.className.indexOf("detail")>=0){tree([].slice.call(ref.querySelectorAll(".rm-zelle .badge")));}' +
      'else{var g={},bs=blatt.querySelectorAll(".raci-zelle .badge"),i;' +
        'for(i=0;i<bs.length;i++){var st=bs[i].getAttribute("data-step")||"";(g[st]=g[st]||[]).push(bs[i]);}' +
        'for(var k in g)if(g.hasOwnProperty(k))tree(g[k]);}' +
    '}' +
    'function fit(){var doc=document.querySelector(".niju-doc");if(!doc)return;' +
      'var avail=doc.clientWidth-28;if(avail<1)return;' +
      'var ps=document.querySelectorAll(".niju-doc-page"),i;' +
      'for(i=0;i<ps.length;i++){var p=ps[i],sc=p.firstElementChild;if(!sc)continue;' +
        'sc.style.transform="none";' +
        'var bl=sc.querySelector(".blatt");if(bl)draw(bl);' +
        'var w=sc.offsetWidth,h=sc.offsetHeight;var s=avail/w;if(s>1)s=1;' +
        'sc.style.transform="scale("+s+")";' +
        'p.style.width=Math.round(w*s)+"px";p.style.height=Math.round(h*s)+"px";p.style.overflow="hidden";}}' +
    'if(document.readyState!=="loading")fit();else document.addEventListener("DOMContentLoaded",fit);' +
    'window.addEventListener("load",fit);window.addEventListener("resize",fit);' +
    '})();</scr' + 'ipt>';

  const m = daten.meta || {};
  const esc = s => String(s == null ? "" : s).replace(/[<>&"]/g, c => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c]));
  const lang = (window.NIJU.I18N && NIJU.I18N.get()) || "en";

  return '<!DOCTYPE html>\n<html lang="' + esc(lang) + '" style="' + esc(rootStyle) + '">\n<head>\n<meta charset="utf-8">\n' +
    '<meta name="viewport" content="width=device-width, initial-scale=1">\n' +
    '<meta name="generator" content="NIJU ICHI Process Builder">\n' +
    '<title>' + esc(m.titel || "Prozess") + '</title>\n' +
    '<style>\n' + css + '\n</style>\n</head>\n' +
    '<body class="' + optClasses + '">\n' +
    '<div class="niju-doc">\n' + seitenHtml + '\n</div>\n' +
    fitScript + '\n' +
    '<script type="application/json" id="niju-process">' + jsonText + '</scr' + 'ipt>\n' +
    '</body>\n</html>\n';
}

/* Klassischer HTML-Download (Blob, text/html). */
function downloadHtml(html, name) {
  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}

/* „HTML page": aktueller Prozess → eine HTML-Datei. */
function exportiereHtml() {
  if (!STATE.daten || !STATE.daten.meta) { alert(t("msg.noSaveData")); return; }
  let html;
  try { html = baueHtmlDokument(STATE.daten); }
  catch (e) { alert(t("html.failed", { err: (e && e.message) || String(e) })); return; }
  downloadHtml(html, htmlName(STATE.daten));
}

/* ============================================================
   „HTML batch": mehrere Prozessdateien wählen → Auswahlfenster →
   pro ausgewähltem Prozess EINE HTML-Datei. Quelle = vom Nutzer
   gewählte JSON-Dateien (Mehrfachauswahl), nichts wird wahllos
   exportiert. Ausgabe: Zielordner (File System Access) oder Downloads.
   ============================================================ */
const htmlBatchInput = document.getElementById("htmlBatchInput");
function htmlBatchStart() { htmlBatchInput.value = ""; htmlBatchInput.click(); }

htmlBatchInput.addEventListener("change", (ev) => {
  const files = Array.from(ev.target.files || []);
  if (!files.length) return;
  const kandidaten = [];
  let rest = files.length;
  const fertig = () => { if (--rest === 0) zeigeHtmlBatchDialog(kandidaten); };
  files.forEach(f => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (d && d.meta && Array.isArray(d.schritte)) kandidaten.push({ file: f.name, daten: d });
      } catch (err) {}
      fertig();
    };
    r.onerror = fertig;
    r.readAsText(f, "utf-8");
  });
});

function batchTitel(k) { return (k.daten.meta && k.daten.meta.titel) || k.file; }

function zeigeHtmlBatchDialog(kandidaten) {
  const alt = document.getElementById("htmlBatchOverlay"); if (alt) alt.remove();
  if (!kandidaten.length) { alert(t("htmlBatch.none")); return; }
  kandidaten.sort((a, b) => batchTitel(a).localeCompare(batchTitel(b)));

  const overlay = el("div", "import-overlay"); overlay.id = "htmlBatchOverlay";
  const dialog = el("div", "import-dialog"); dialog.style.width = "min(540px, 94vw)";
  const kopf = el("div", "import-kopf");
  kopf.appendChild(el("h2", null, t("htmlBatch.title")));
  kopf.appendChild(el("p", null, t("htmlBatch.intro")));
  dialog.appendChild(kopf);

  const body = el("div", "import-body");
  const liste = el("div", "batch-liste");
  const checks = [];
  kandidaten.forEach(k => {
    const row = el("label", "batch-row");
    const cb = document.createElement("input"); cb.type = "checkbox"; cb.checked = true;
    cb.addEventListener("change", aktualisiere);
    const txt = el("div", "batch-txt");
    txt.appendChild(el("div", "batch-titel", batchTitel(k)));
    txt.appendChild(el("div", "batch-datei", k.file));
    row.appendChild(cb); row.appendChild(txt);
    liste.appendChild(row);
    checks.push({ cb: cb, k: k });
  });
  body.appendChild(liste);
  dialog.appendChild(body);

  const fuss = el("div", "import-fuss");
  const summe = el("div", "summe"); fuss.appendChild(summe);
  const alleBtn = el("button", "btn-sek", "");
  alleBtn.addEventListener("click", () => {
    const an = checks.some(c => !c.cb.checked);
    checks.forEach(c => c.cb.checked = an); aktualisiere();
  });
  const abbrechen = el("button", "btn-sek", t("htmlBatch.cancel"));
  abbrechen.addEventListener("click", () => overlay.remove());
  const exportBtn = el("button", "btn-akt", "");
  exportBtn.addEventListener("click", async () => {
    const auswahl = checks.filter(c => c.cb.checked).map(c => c.k);
    if (!auswahl.length) return;
    exportBtn.disabled = abbrechen.disabled = alleBtn.disabled = true;
    summe.textContent = t("htmlBatch.working");
    try {
      const res = await fuehreHtmlBatchAus(auswahl);
      overlay.remove();
      if (res && !res.aborted) {
        alert(res.folder ? t("htmlBatch.writtenFolder", { n: res.written })
                         : t("htmlBatch.done", { n: res.written }));
      }
    } catch (e) {
      exportBtn.disabled = abbrechen.disabled = alleBtn.disabled = false;
      summe.textContent = "";
      alert(t("html.failed", { err: (e && e.message) || String(e) }));
    }
  });

  function aktualisiere() {
    const n = checks.filter(c => c.cb.checked).length;
    summe.textContent = t("htmlBatch.count", { n: n });
    exportBtn.textContent = t("htmlBatch.export", { n: n });
    exportBtn.disabled = (n === 0);
    alleBtn.textContent = checks.some(c => !c.cb.checked) ? t("htmlBatch.selectAll") : t("htmlBatch.deselectAll");
  }

  fuss.appendChild(alleBtn); fuss.appendChild(abbrechen); fuss.appendChild(exportBtn);
  dialog.appendChild(fuss);
  overlay.appendChild(dialog);
  document.body.appendChild(overlay);
  aktualisiere();
}

function htmlDelay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fuehreHtmlBatchAus(auswahl) {
  /* Pro Prozess eine Datei bauen; bei Namensgleichheit eindeutig machen. */
  const gesehen = {};
  const dateien = auswahl.map(k => {
    let name = htmlName(k.daten);
    if (gesehen[name]) { const basis = name.replace(/\.html$/, ""); let i = 2; while (gesehen[basis + "-" + i + ".html"]) i++; name = basis + "-" + i + ".html"; }
    gesehen[name] = true;
    return { name: name, html: baueHtmlDokument(k.daten) };
  });
  return await batchSpeichern(dateien);
}

/* Ausgabe: bevorzugt Zielordner (File System Access), sonst Einzel-Downloads. */
async function batchSpeichern(dateien) {
  if (window.showDirectoryPicker) {
    let dir = null;
    try {
      const opts = { mode: "readwrite" };
      try { const last = await idbHandleLaden("htmlout"); if (last) opts.startIn = last; } catch (e) {}
      dir = await window.showDirectoryPicker(opts);
    } catch (e) { if (e && e.name === "AbortError") return { aborted: true }; }
    if (dir) {
      for (const d of dateien) {
        const fh = await dir.getFileHandle(d.name, { create: true });
        const w = await fh.createWritable(); await w.write(d.html); await w.close();
      }
      idbHandleSpeichern("htmlout", dir);
      return { written: dateien.length, folder: true };
    }
  }
  for (const d of dateien) { downloadHtml(d.html, d.name); await htmlDelay(180); }
  return { written: dateien.length, folder: false };
}

/* ============================================================
   Markdown-Export („Markdown (AI)") — maschinenlesbare Prosa-Fassung
   für KI/RAG (M365-Copilot, Atlassian-Rovo, Custom-RAG). REIN ADDITIV:
   nutzt dieselben Prozessdaten wie der JSON-/HTML-Export und ändert KEINE
   bestehende Funktion. Inhalt je Prozess: YAML-Front-Matter (Metadaten) ·
   Steckbrief · Input/Output · je Schritt Klartext + ausgeschriebenes RACI +
   stabiler Anker · konsolidierte RACI-Matrix (Tabelle) · Glossar (aus der
   prozess-eigenen Legende). RACI-Buchstaben werden in Klartext-Sätze
   aufgelöst — genau das, was ein Retrieval-System (RAG) lesen kann.
   - „Markdown page": aktueller Prozess → eine .md-Datei (Download).
   - „Markdown batch": gewählte JSON-Dateien → je eine .md + manifest.json
     (Korpus-Index) in einen Zielordner (File System Access) oder Downloads.
   ============================================================ */

/* Lokalisierte STRUKTUR-Labels (nur das Gerüst, KEIN Nutzer-Inhalt — der
   bleibt unübersetzt). Fällt auf Englisch zurück. */
const MD_LABELS = {
  en: { step: "Step", input: "Input", output: "Output", responsible: "Responsible",
        owner: "Process owner", version: "Version", date: "Date", company: "Company",
        id: "Process ID", anchor: "Anchor", profile: "At a glance",

        role: "Role", glossary: "Glossary",
        R: "Responsible (R)", A: "Accountable (A)", C: "Consulted (C)", I: "Informed (I)",
        legend: { R: "Responsible — does the work",
                  A: "Accountable — owns the decision / sign-off",
                  C: "Consulted — gives input", I: "Informed — kept up to date" } },
  de: { step: "Schritt", input: "Input", output: "Output", responsible: "Verantwortlich",
        owner: "Process Owner", version: "Version", date: "Stand", company: "Firma",
        id: "Prozess-ID", anchor: "Anker", profile: "Steckbrief",
        raciHead: "RACI für diesen Schritt", matrix: "RACI-Matrix (Rollen × Schritte)",
        role: "Rolle", glossary: "Glossar",
        R: "Verantwortlich (R)", A: "Rechenschaftspflichtig (A)", C: "Konsultiert (C)", I: "Informiert (I)",
        legend: { R: "Verantwortlich — führt die Arbeit aus",
                  A: "Rechenschaftspflichtig — trägt Entscheidung / Freigabe",
                  C: "Konsultiert — wird um Input gebeten", I: "Informiert — wird auf dem Laufenden gehalten" } },
  ja: { step: "ステップ", input: "インプット", output: "アウトプット", responsible: "担当",
        owner: "プロセスオーナー", version: "バージョン", date: "日付", company: "会社",
        id: "プロセスID", anchor: "アンカー", profile: "概要",
        raciHead: "このステップのRACI", matrix: "RACIマトリクス（役割 × ステップ）",
        role: "役割", glossary: "用語集",
        R: "実行責任 (R)", A: "説明責任 (A)", C: "協業 (C)", I: "報告 (I)",
        legend: { R: "実行責任 — 作業を行う",
                  A: "説明責任 — 決定・承認を持つ",
                  C: "協業 — 意見を提供する", I: "報告 — 情報を共有される" } }
};
function mdLabels() {
  const lang = (window.NIJU && NIJU.I18N && NIJU.I18N.get && NIJU.I18N.get()) || "en";
  return MD_LABELS[lang] || MD_LABELS.en;
}

/* slug aus beliebigem Text — für Dateiname + Anker (stabiler Deep-Link). */
function mdSlug(s) {
  return String(s || "").toLowerCase().replace(/[^a-z0-9äöüß]+/gi, "-").replace(/^-+|-+$/g, "");
}
function mdName(daten) {
  const m = ((daten || STATE.daten) || {}).meta || {};
  return (mdSlug(m.prozessId || m.titel) || "prozess") + ".md";
}
/* YAML-Wert sicher quoten. */
function mdYaml(v) {
  return '"' + String(v == null ? "" : v).replace(/\\/g, "\\\\").replace(/"/g, '\\"') + '"';
}
/* Tabellenzelle: Pipe maskieren, Zeilenumbrüche zu Leerzeichen. */
function mdCell(v) {
  return String(v == null ? "" : v).replace(/\|/g, "\\|").replace(/\s*\n\s*/g, " ").trim();
}

/* RACI eines Schritts nach Buchstabe gruppieren → { R:[rollen], A:[…], C:[…], I:[…] }. */
function mdRaciGruppen(daten, stepId) {
  const out = { R: [], A: [], C: [], I: [] };
  const row = (daten.raci && daten.raci[stepId]) || {};
  (daten.rollen || []).forEach(rolle => {
    (row[rId(rolle)] || []).forEach(b => { if (out[b]) out[b].push(rName(rolle)); });
  });
  return out;
}
/* Aufzählungspunkte eines Schritts (mit optionalen Unterpunkten). */
function mdPunkte(punkte) {
  let s = "";
  (punkte || []).forEach(p => {
    const text = (typeof p === "string") ? p : (p.text || "");
    s += "- " + String(text).trim() + "\n";
    const unter = (typeof p === "object" && p && p.unterpunkte) ? p.unterpunkte : null;
    if (unter && unter.length) unter.forEach(u => { s += "  - " + String(u).trim() + "\n"; });
  });
  return s;
}
/* Optionale RACI-gruppierte Narrative („beschreibung"). **fett** bleibt erhalten. */
function mdBeschreibung(beschr, L) {
  let s = "";
  (beschr || []).forEach(b => {
    const tag = L[b.raci] || b.raci || "";
    s += "\n**" + (tag ? tag + " · " : "") + String(b.titel || "").replace(/\n/g, " ") + "**\n\n";
    (b.inhalt || []).forEach(it => {
      if (typeof it === "string") { s += String(it).trim() + "\n\n"; }
      else if (it && it.liste) {
        it.liste.forEach(li => {
          const text = (typeof li === "string") ? li : (li.text || "");
          s += "- " + String(text).trim() + "\n";
          const unter = (typeof li === "object" && li && li.unterpunkte) ? li.unterpunkte : null;
          if (unter && unter.length) unter.forEach(u => { s += "  - " + String(u).trim() + "\n"; });
        });
        s += "\n";
      }
    });
  });
  return s;
}

/* KERN: ein Prozess-Objekt → vollständiges Markdown (rein, ohne Seiteneffekte). */
function prozessNachMarkdown(daten, L, heute) {
  if (!daten) return "";
  const m = daten.meta || {};
  const schritte = daten.schritte || [];
  const rollen = daten.rollen || [];
  const leg = daten.legende || {};
  const NL = "\n";
  let s = "";

  /* --- YAML-Front-Matter (Metadaten für Retrieval) --- */
  s += "---" + NL;
  s += "prozess_id: " + mdYaml(m.prozessId || "") + NL;
  s += "titel: " + mdYaml(m.titel || "") + NL;
  s += "owner: " + mdYaml(m.processOwner || "") + NL;
  s += "version: " + mdYaml(m.version || "") + NL;
  s += "stand: " + mdYaml(m.datum || "") + NL;
  if (m.firma) s += "firma: " + mdYaml(m.firma) + NL;
  s += "schritte: " + schritte.length + NL;
  s += "rollen: [" + rollen.map(r => mdYaml(rName(r))).join(", ") + "]" + NL;
  s += "quelle: " + mdYaml("") + NL;
  s += "generator: " + mdYaml("NIJU ICHI Process Builder") + NL;
  s += "exportiert: " + mdYaml(heute) + NL;
  s += "---" + NL + NL;

  /* --- Titel + Steckbrief --- */
  s += "# " + (m.titel || "Prozess") + NL + NL;
  const steck = [];
  if (m.prozessId) steck.push(L.id + ": " + m.prozessId);
  if (m.processOwner) steck.push(L.owner + ": " + m.processOwner);
  if (m.version) steck.push(L.version + ": " + m.version);
  if (m.datum) steck.push(L.date + ": " + m.datum);
  if (steck.length) s += "**" + L.profile + ":** " + steck.join(" · ") + NL + NL;

  /* --- Input --- */
  const inp = (daten.input && daten.input.punkte) || [];
  if (inp.length) {
    s += "## " + L.input + NL + NL;
    inp.forEach(p => { s += "- " + String(typeof p === "string" ? p : (p.text || "")).trim() + NL; });
    s += NL;
  }

  /* --- Schritte: Klartext + ausgeschriebenes RACI + stabiler Anker --- */
  schritte.forEach((sch, i) => {
    const anker = "schritt-" + (sch.id ? mdSlug(sch.id) : (i + 1));
    s += "## " + L.step + " " + (i + 1) + ": " + String(sch.titel || "").trim() + NL;
    if (sch.untertitel) s += "*" + String(sch.untertitel).trim() + "*" + NL;
    s += NL + "`" + L.anchor + ": #" + anker + "`" + NL + NL;

    schrittBloecke(sch).forEach(block => {
      if (block.typ === "absatz") {
        if (block.text && String(block.text).trim()) s += String(block.text).trim() + NL + NL;
      } else {
        if (block.ueberschrift) s += "**" + String(block.ueberschrift).trim() + "**" + NL + NL;
        const pk = mdPunkte(block.punkte);
        if (pk) s += pk + NL;
      }
    });

    const g = mdRaciGruppen(daten, sch.id);
    const zeilen = ["R", "A", "C", "I"].filter(k => g[k].length);
    if (zeilen.length) {
      s += "**" + L.raciHead + ":**" + NL + NL;
      zeilen.forEach(k => { s += "- **" + L[k] + ":** " + g[k].join(", ") + NL; });
      s += NL;
    }
    if (sch.beschreibung && sch.beschreibung.length) s += mdBeschreibung(sch.beschreibung, L);
  });

  /* --- Output --- */
  const outp = (daten.output && daten.output.punkte) || [];
  if (outp.length) {
    s += "## " + L.output + NL + NL;
    if (daten.output.verantwortlich) s += "**" + L.responsible + ":** " + daten.output.verantwortlich + NL + NL;
    outp.forEach(p => { s += "- " + String(typeof p === "string" ? p : (p.text || "")).trim() + NL; });
    s += NL;
  }

  /* --- Konsolidierte RACI-Matrix als Tabelle (LLM-freundlich) --- */
  if (rollen.length && schritte.length) {
    s += "## " + L.matrix + NL + NL;
    s += "| " + L.role + " | " + schritte.map((sc, i) => "S" + (i + 1)).join(" | ") + " |" + NL;
    s += "| --- |" + schritte.map(() => " :-: |").join("") + NL;
    rollen.forEach(rolle => {
      const cells = schritte.map(sc => {
        const b = (daten.raci && daten.raci[sc.id] && daten.raci[sc.id][rId(rolle)]) || [];
        return b.join(", ") || "–";
      });
      s += "| " + mdCell(rName(rolle)) + " | " + cells.join(" | ") + " |" + NL;
    });
    s += NL;
    s += schritte.map((sc, i) => "S" + (i + 1) + " = " + String(sc.titel || sc.id || "")).join(" · ") + NL + NL;
  }

  /* --- Glossar: prozess-eigene Legende (sonst Default) → gibt der KI den Rahmen --- */
  s += "## " + L.glossary + NL + NL;
  ["R", "A", "C", "I"].forEach(k => {
    const def = leg[k] || (L.legend && L.legend[k]) || "";
    s += "- **" + k + "** — " + def + NL;
  });
  s += NL;

  if (m.fusstext) s += "---" + NL + NL + "*" + m.fusstext + "*" + NL;
  return s;
}

/* Wrapper: aktueller/Ziel-Prozess → Markdown-Text (wählt Sprache + Datum). */
function baueMarkdownDokument(zielDaten) {
  return prozessNachMarkdown(zielDaten || STATE.daten, mdLabels(), new Date().toISOString().slice(0, 10));
}
/* Klassischer Download (text/markdown). */
function downloadMd(text, name) {
  const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
/* „Markdown page": aktueller Prozess → eine .md-Datei. */
function exportiereMarkdown() {
  if (!STATE.daten || !STATE.daten.meta) { alert(t("msg.noSaveData")); return; }
  let md;
  try { md = baueMarkdownDokument(STATE.daten); }
  catch (e) { alert(t("html.failed", { err: (e && e.message) || String(e) })); return; }
  downloadMd(md, mdName(STATE.daten));
}

/* ---- „Markdown batch": gewählte JSONs → je .md + manifest.json ---- */
const mdBatchInput = document.getElementById("mdBatchInput");
function mdBatchStart() { mdBatchInput.value = ""; mdBatchInput.click(); }
mdBatchInput.addEventListener("change", (ev) => {
  const files = Array.from(ev.target.files || []);
  if (!files.length) return;
  const kandidaten = [];
  let rest = files.length;
  const fertig = () => { if (--rest === 0) zeigeMdBatchDialog(kandidaten); };
  files.forEach(f => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (d && d.meta && Array.isArray(d.schritte)) kandidaten.push({ file: f.name, daten: d });
      } catch (err) {}
      fertig();
    };
    r.onerror = fertig;
    r.readAsText(f, "utf-8");
  });
});

/* manifest.json = Korpus-Index für die RAG-Pipeline (eine Zeile je Prozess). */
function baueManifest(dateien, heute) {
  return JSON.stringify({
    "niju.manifest": 1,
    generator: "NIJU ICHI Process Builder",
    erstellt: heute,
    anzahl: dateien.length,
    prozesse: dateien.map(d => {
      const m = d.daten.meta || {};
      return {
        datei: d.name,
        prozessId: m.prozessId || "",
        titel: m.titel || "",
        owner: m.processOwner || "",
        version: m.version || "",
        stand: m.datum || "",
        schritte: (d.daten.schritte || []).length,
        rollen: (d.daten.rollen || []).map(rName)
      };
    })
  }, null, 2);
}

async function fuehreMdBatchAus(auswahl) {
  const heute = new Date().toISOString().slice(0, 10);
  const L = mdLabels();
  const gesehen = {};
  const dateien = auswahl.map(k => {
    let name = mdName(k.daten);
    if (gesehen[name]) { const basis = name.replace(/\.md$/, ""); let i = 2; while (gesehen[basis + "-" + i + ".md"]) i++; name = basis + "-" + i + ".md"; }
    gesehen[name] = true;
    return { name: name, text: prozessNachMarkdown(k.daten, L, heute), daten: k.daten };
  });
  return await batchSpeichernMd(dateien, heute);
}

/* Ausgabe: bevorzugt Zielordner (File System Access) inkl. manifest.json,
   sonst Einzel-Downloads (+ manifest.json). Eigener Ordner-Merker „mdout". */
async function batchSpeichernMd(dateien, heute) {
  const manifest = baueManifest(dateien, heute);
  if (window.showDirectoryPicker) {
    let dir = null;
    try {
      const opts = { mode: "readwrite" };
      try { const last = await idbHandleLaden("mdout"); if (last) opts.startIn = last; } catch (e) {}
      dir = await window.showDirectoryPicker(opts);
    } catch (e) { if (e && e.name === "AbortError") return { aborted: true }; }
    if (dir) {
      for (const d of dateien) {
        const fh = await dir.getFileHandle(d.name, { create: true });
        const w = await fh.createWritable(); await w.write(d.text); await w.close();
      }
      const mh = await dir.getFileHandle("manifest.json", { create: true });
      const mw = await mh.createWritable(); await mw.write(manifest); await mw.close();
      idbHandleSpeichern("mdout", dir);
      return { written: dateien.length, folder: true };
    }
  }
  for (const d of dateien) { downloadMd(d.text, d.name); await htmlDelay(180); }
  downloadMd(manifest, "manifest.json");

}

/* ============================================================
   Confluence-Export („Confluence (AI)") — NATIVE Confluence-Seiten im
   Storage-Format (XHTML + ac:-Makros) statt eingebettetem HTML-Blob.
   Der Inhalt wird so Teil des INDEXIERTEN, durchsuchbaren Seitenkörpers
   (Confluence-Suche + M365-Copilot-Connector + Atlassian Rovo lesen echten
   Text — keine iframe-/Attachment-Blackbox). REIN ADDITIV; teilt die
   lokalisierten Labels (MD_LABELS/mdLabels) und Helfer (mdSlug,
   mdRaciGruppen, idbHandle*, htmlDelay, batchTitel) mit dem Markdown-Export.
   Ausgabe je Prozess: <slug>.confluence.xml = der Wert für `body.storage.value`
   der Confluence-REST-API (POST /wiki/rest/api/content). Inhalt: TOC-Makro,
   Info-Panel (Metadaten), je Schritt Anker-Makro + Überschrift + Punkte +
   ausgeschriebenes RACI + Narrative, echte RACI-Matrix als <table> mit <th>,
   Glossar. „Confluence page" = aktueller Prozess; „Confluence batch" = je
   .xml + manifest.json (Seiten-/Korpus-Index für das Hochladen).
   ============================================================ */

/* XML-/XHTML-Escape für Text-Inhalt. */
function cfEsc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
/* Wie cfEsc, aber **fett** → <strong> (Confluence-XHTML). */
function cfRich(s) { return cfEsc(s).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>"); }
/* Confluence-Anker-Makro: stabiler Deep-Link, unabhängig vom Überschriftstext. */
function cfAnchor(name) {
  return '<ac:structured-macro ac:name="anchor" ac:schema-version="1"><ac:parameter ac:name="">' + cfEsc(name) + '</ac:parameter></ac:structured-macro>';
}
function confluenceName(daten) {
  const m = ((daten || STATE.daten) || {}).meta || {};
  return (mdSlug(m.prozessId || m.titel) || "prozess") + ".confluence.xml";
}
/* Aufzählung (mit optionalen Unterpunkten) → <ul>. */
function cfPunkte(punkte) {
  let s = "";
  (punkte || []).forEach(p => {
    const text = (typeof p === "string") ? p : (p.text || "");
    const unter = (typeof p === "object" && p && p.unterpunkte) ? p.unterpunkte : null;
    s += "<li>" + cfRich(String(text).trim());
    if (unter && unter.length) { s += "<ul>"; unter.forEach(u => { s += "<li>" + cfRich(String(u).trim()) + "</li>"; }); s += "</ul>"; }
    s += "</li>";
  });
  return s ? ("<ul>" + s + "</ul>") : "";
}
/* Optionale RACI-gruppierte Narrative („beschreibung") → Absätze/Listen. */
function cfBeschreibung(beschr, L) {
  let s = "";
  (beschr || []).forEach(b => {
    const tag = L[b.raci] || b.raci || "";
    s += "<p><strong>" + cfEsc((tag ? tag + " · " : "") + String(b.titel || "").replace(/\n/g, " ")) + "</strong></p>";
    (b.inhalt || []).forEach(it => {
      if (typeof it === "string") { s += "<p>" + cfRich(String(it).trim()) + "</p>"; }
      else if (it && it.liste) {
        s += "<ul>";
        it.liste.forEach(li => {
          const text = (typeof li === "string") ? li : (li.text || "");
          const unter = (typeof li === "object" && li && li.unterpunkte) ? li.unterpunkte : null;
          s += "<li>" + cfRich(String(text).trim());
          if (unter && unter.length) { s += "<ul>"; unter.forEach(u => { s += "<li>" + cfRich(String(u).trim()) + "</li>"; }); s += "</ul>"; }
          s += "</li>";
        });
        s += "</ul>";
      }
    });
  });
  return s;
}

/* KERN: ein Prozess-Objekt → Confluence-Storage-XHTML (rein, ohne Seiteneffekte). */
function prozessNachConfluence(daten, L, heute) {
  if (!daten) return "";
  const m = daten.meta || {};
  const schritte = daten.schritte || [];
  const rollen = daten.rollen || [];
  const leg = daten.legende || {};
  let s = "";

  /* Inhaltsverzeichnis-Makro (listet die Schritt-Überschriften nativ). */
  s += '<ac:structured-macro ac:name="toc" ac:schema-version="1"/>';

  /* Metadaten als Info-Panel (sichtbar + durchsuchbar/indexierbar). */
  const info = [];
  if (m.prozessId)   info.push("<strong>" + cfEsc(L.id) + ":</strong> " + cfEsc(m.prozessId));
  if (m.processOwner) info.push("<strong>" + cfEsc(L.owner) + ":</strong> " + cfEsc(m.processOwner));
  if (m.version)     info.push("<strong>" + cfEsc(L.version) + ":</strong> " + cfEsc(m.version));
  if (m.datum)       info.push("<strong>" + cfEsc(L.date) + ":</strong> " + cfEsc(m.datum));
  if (m.firma)       info.push("<strong>" + cfEsc(L.company) + ":</strong> " + cfEsc(m.firma));
  if (info.length) s += '<ac:structured-macro ac:name="info" ac:schema-version="1"><ac:rich-text-body><p>' + info.join("<br/>") + '</p></ac:rich-text-body></ac:structured-macro>';

  /* Input */
  const inp = (daten.input && daten.input.punkte) || [];
  if (inp.length) s += "<h2>" + cfEsc(L.input) + "</h2>" + cfPunkte(inp);

  /* Schritte: Anker + Überschrift + Punkte + ausgeschriebenes RACI + Narrative */
  schritte.forEach((sch, i) => {
    const anker = "schritt-" + (sch.id ? mdSlug(sch.id) : (i + 1));
    s += cfAnchor(anker);
    s += "<h2>" + cfEsc(L.step + " " + (i + 1) + ": " + String(sch.titel || "").trim()) + "</h2>";
    if (sch.untertitel) s += "<p><em>" + cfEsc(String(sch.untertitel).trim()) + "</em></p>";
    schrittBloecke(sch).forEach(block => {
      if (block.typ === "absatz") {
        if (block.text && String(block.text).trim()) s += "<p>" + cfRich(String(block.text).trim()) + "</p>";
      } else {
        if (block.ueberschrift) s += "<p><strong>" + cfEsc(String(block.ueberschrift).trim()) + "</strong></p>";
        s += cfPunkte(block.punkte);
      }
    });
    const g = mdRaciGruppen(daten, sch.id);
    const zeilen = ["R", "A", "C", "I"].filter(k => g[k].length);
    if (zeilen.length) {
      s += "<p><strong>" + cfEsc(L.raciHead) + ":</strong></p><ul>";
      zeilen.forEach(k => { s += "<li><strong>" + cfEsc(L[k]) + ":</strong> " + cfEsc(g[k].join(", ")) + "</li>"; });
      s += "</ul>";
    }
    if (sch.beschreibung && sch.beschreibung.length) s += cfBeschreibung(sch.beschreibung, L);
  });

  /* Output */
  const outp = (daten.output && daten.output.punkte) || [];
  if (outp.length) {
    s += "<h2>" + cfEsc(L.output) + "</h2>";
    if (daten.output.verantwortlich) s += "<p><strong>" + cfEsc(L.responsible) + ":</strong> " + cfEsc(daten.output.verantwortlich) + "</p>";
    s += cfPunkte(outp);
  }

  /* Konsolidierte RACI-Matrix als echte Confluence-Tabelle (mit Kopfzellen). */
  if (rollen.length && schritte.length) {
    s += "<h2>" + cfEsc(L.matrix) + "</h2><table><tbody><tr><th>" + cfEsc(L.role) + "</th>";
    schritte.forEach(sc => { s += "<th>" + cfEsc(String(sc.titel || sc.id || "").trim()) + "</th>"; });
    s += "</tr>";
    rollen.forEach(rolle => {
      s += "<tr><th>" + cfEsc(rName(rolle)) + "</th>";
      schritte.forEach(sc => {
        const b = (daten.raci && daten.raci[sc.id] && daten.raci[sc.id][rId(rolle)]) || [];
        s += "<td>" + cfEsc(b.join(", ") || "–") + "</td>";
      });
      s += "</tr>";
    });
    s += "</tbody></table>";
  }

  /* Glossar aus der prozess-eigenen Legende (sonst Default). */
  s += "<h2>" + cfEsc(L.glossary) + "</h2><ul>";
  ["R", "A", "C", "I"].forEach(k => { s += "<li><strong>" + cfEsc(k) + "</strong> — " + cfEsc(leg[k] || (L.legend && L.legend[k]) || "") + "</li>"; });
  s += "</ul>";

  if (m.fusstext) s += "<hr/><p><em>" + cfEsc(m.fusstext) + "</em></p>";
  return s;
}

/* Wrapper: aktueller/Ziel-Prozess → Storage-XHTML (Sprache + Datum). */
function baueConfluenceDokument(zielDaten) {
  return prozessNachConfluence(zielDaten || STATE.daten, mdLabels(), new Date().toISOString().slice(0, 10));
}
/* Klassischer Download (application/xml). */
function downloadCf(text, name) {
  const blob = new Blob([text], { type: "application/xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
/* „Confluence page": aktueller Prozess → eine .confluence.xml. */
function exportiereConfluence() {
  if (!STATE.daten || !STATE.daten.meta) { alert(t("msg.noSaveData")); return; }
  let xml;
  try { xml = baueConfluenceDokument(STATE.daten); }
  catch (e) { alert(t("html.failed", { err: (e && e.message) || String(e) })); return; }
  downloadCf(xml, confluenceName(STATE.daten));
}

confluenceBatchInput.addEventListener("change", (ev) => {
  const files = Array.from(ev.target.files || []);
  if (!files.length) return;
  const kandidaten = [];
  let rest = files.length;
  const fertig = () => { if (--rest === 0) zeigeCfBatchDialog(kandidaten); };
  files.forEach(f => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (d && d.meta && Array.isArray(d.schritte)) kandidaten.push({ file: f.name, daten: d });
      } catch (err) {}
      fertig();
    };
    r.onerror = fertig;
    r.readAsText(f, "utf-8");
  });
});

/* manifest.json = Seiten-/Korpus-Index für das Hochladen via Confluence-REST-API. */
function baueCfManifest(dateien, heute) {
  return JSON.stringify({
    "niju.manifest": 1,
    format: "confluence-storage",
    generator: "NIJU ICHI Process Builder",
    erstellt: heute,
    anzahl: dateien.length,
    prozesse: dateien.map(d => {
      const m = d.daten.meta || {};
      return {
        datei: d.name,
        titel: m.titel || "",
        prozessId: m.prozessId || "",
        owner: m.processOwner || "",
        version: m.version || "",
        stand: m.datum || "",
        schritte: (d.daten.schritte || []).length,
        rollen: (d.daten.rollen || []).map(rName)
      };
    })
  }, null, 2);
}

async function fuehreCfBatchAus(auswahl) {
  const heute = new Date().toISOString().slice(0, 10);
  const L = mdLabels();
  const gesehen = {};
  const dateien = auswahl.map(k => {
    let name = confluenceName(k.daten);
    if (gesehen[name]) { const basis = name.replace(/\.confluence\.xml$/, ""); let i = 2; while (gesehen[basis + "-" + i + ".confluence.xml"]) i++; name = basis + "-" + i + ".confluence.xml"; }
    gesehen[name] = true;
    return { name: name, text: prozessNachConfluence(k.daten, L, heute), daten: k.daten };
  });
  return await batchSpeichernCf(dateien, heute);
}

/* Ausgabe: bevorzugt Zielordner (File System Access) inkl. manifest.json,
   sonst Einzel-Downloads (+ manifest.json). Eigener Ordner-Merker „cfout". */
async function batchSpeichernCf(dateien, heute) {
  const manifest = baueCfManifest(dateien, heute);
  if (window.showDirectoryPicker) {
    let dir = null;
    try {
      const opts = { mode: "readwrite" };
      try { const last = await idbHandleLaden("cfout"); if (last) opts.startIn = last; } catch (e) {}
      dir = await window.showDirectoryPicker(opts);
    } catch (e) { if (e && e.name === "AbortError") return { aborted: true }; }
    if (dir) {
      for (const d of dateien) {
        const fh = await dir.getFileHandle(d.name, { create: true });
        const w = await fh.createWritable(); await w.write(d.text); await w.close();
      }
      const mh = await dir.getFileHandle("manifest.json", { create: true });
      const mw = await mh.createWritable(); await mw.write(manifest); await mw.close();
      idbHandleSpeichern("cfout", dir);
      return { written: dateien.length, folder: true };
    }
  }
  for (const d of dateien) { downloadCf(d.text, d.name); await htmlDelay(180); }
  downloadCf(manifest, "manifest.json");
  return { written: dateien.length, folder: false };
}

  menuDropdown.hidden = true;

/* ============================================================
   draw.io-Import (Phase 3) — .drawio / .xml (mxGraph)
   Liest alle Textfelder + Koordinaten, schlägt eine Zuordnung vor
   und zeigt einen Bestätigungs-Dialog (semi-automatisch).
   ============================================================ */

/* draw.io-Wert (oft HTML) → reiner Text mit Zeilenumbrüchen */
function textAusWert(wert) {
  if (wert == null) return "";
  let s = String(wert).replace(/<br\s*\/?>/gi, "\n").replace(/<\/p>/gi, "\n").replace(/<\/div>/gi, "\n");
  const tmp = document.createElement("div");
  tmp.innerHTML = s;
  let txt = tmp.textContent || "";
  return txt.replace(/ /g, " ").replace(/[ \t]+/g, " ").replace(/\s*\n\s*/g, "\n").replace(/\n{2,}/g, "\n").trim();
}

/* Base64 → Uint8Array */
function base64ZuBytes(b64) {
  const bin = atob(b64.replace(/\s+/g, ""));
  const a = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
  return a;
}

/* Raw-Deflate entpacken über die Browser-API (offline, ohne Bibliothek) */
async function entpackeRaw(bytes) {
  if (typeof DecompressionStream === "undefined") throw new Error(t("msg.decompressUnsupported"));
  const ds = new DecompressionStream("deflate-raw");
  const stream = new Blob([bytes]).stream().pipeThrough(ds);
  const buf = await new Response(stream).arrayBuffer();
  return new TextDecoder().decode(new Uint8Array(buf));
}

/* Geometrie einer Zelle (eigene, relativ zum Eltern) */
function geomVon(cell) {
  const g = Array.from(cell.children).find(ch => ch.nodeName === "mxGeometry");
  if (!g) return null;
  const num = a => { const v = parseFloat(g.getAttribute(a)); return isNaN(v) ? 0 : v; };
  return { x: num("x"), y: num("y"), w: num("width"), h: num("height") };
}
/* Absolute Position (Eltern-Gruppen aufsummieren) */
function absPos(cell, byId) {
  let x = 0, y = 0, cur = cell;
  while (cur && cur.getAttribute && cur.getAttribute("vertex") === "1") {
    const g = geomVon(cur); if (g) { x += g.x; y += g.y; }
    cur = byId[cur.getAttribute("parent")];
  }
  return { x, y };
}

/* Datei-Text → Liste von Text-Knoten {text,x,y,w,h,cx,cy} (async wegen Entpacken) */
async function leseDrawio(text) {
  let xmlText = text;
  if (!/<mxGraphModel/i.test(xmlText)) {
    const m = xmlText.match(/<diagram[^>]*>([\s\S]*?)<\/diagram>/i);
    if (m && m[1].trim()) {
      xmlText = decodeURIComponent(await entpackeRaw(base64ZuBytes(m[1].trim())));
    }
  }
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  if (doc.querySelector("parsererror")) throw new Error(t("msg.notXml"));
  const cells = Array.from(doc.getElementsByTagName("mxCell"));
  const byId = {};
  cells.forEach(c => { byId[c.getAttribute("id")] = c; });
  const nodes = [];
  cells.forEach(c => {
    if (c.getAttribute("vertex") !== "1") return;
    const txt = textAusWert(c.getAttribute("value") || "");
    if (!txt) return;
    const g = geomVon(c); if (!g) return;
    const p = absPos(c, byId);
    nodes.push({ id: c.getAttribute("id"), text: txt, x: p.x, y: p.y, w: g.w, h: g.h, cx: p.x + g.w / 2, cy: p.y + g.h / 2 });
  });
  return nodes;
}

/* Heuristische Erst-Zuordnung anhand der Lage */
function klassifiziere(nodes) {
  const raciRe = /^[\s]*[raciRACI]([\s,\/.;|·]*[raciRACI])*[\s]*$/;
  nodes.forEach(n => { n.kat = (raciRe.test(n.text) && n.text.length <= 14) ? "raci" : null; });
  const raci = nodes.filter(n => n.kat === "raci");
  const rest = nodes.filter(n => n.kat !== "raci");
  if (rest.length) {
    let titel = rest[0];
    rest.forEach(n => { if (n.y < titel.y - 2 || (Math.abs(n.y - titel.y) <= 2 && n.w > titel.w)) titel = n; });
    titel.kat = "titel";
  }
  if (raci.length) {
    const minX = Math.min.apply(null, raci.map(n => n.x));
    const maxX = Math.max.apply(null, raci.map(n => n.x + n.w));
    const minY = Math.min.apply(null, raci.map(n => n.y));
    const maxY = Math.max.apply(null, raci.map(n => n.y + n.h));
    nodes.forEach(n => {
      if (n.kat) return;
      if (n.cy >= minY - 6 && n.cy <= maxY + 6 && n.cx < minX) n.kat = "rolle";
      else if (n.cx >= minX - 6 && n.cx <= maxX + 6 && n.cy < minY) n.kat = "schritt";
    });
  }
  nodes.forEach(n => { if (!n.kat) n.kat = "ignore"; });
}

/* Kategorien für die Dropdowns */
const IMPORT_KATEGORIEN = [
  ["ignore", "import.catIgnore"],
  ["titel", "import.catTitle"],
  ["prozessId", "import.catProcessId"],
  ["firma", "import.catCompany"],
  ["owner", "import.catOwner"],
  ["schritt", "import.catStep"],
  ["rolle", "import.catRole"],
  ["raci", "import.catRaci"],
  ["input", "import.catInput"],
  ["output", "import.catOutput"],
  ["legende", "import.catLegend"]
];

/* Aus den (vom Nutzer bestätigten) Knoten das Prozess-JSON bauen */
function baueDatenAusNodes(nodes) {
  const get = k => nodes.filter(n => n.kat === k);
  const einzeilig = n => n.text.replace(/\n+/g, " ").trim();
  const meta = { titel: "", firma: "", firmaModus: "text", logo: "", prozessId: "", version: "1.0", datum: "", processOwner: "", fusstext: "" };
  if (get("titel")[0]) meta.titel = einzeilig(get("titel")[0]);
  if (get("prozessId")[0]) meta.prozessId = einzeilig(get("prozessId")[0]);
  if (get("firma")[0]) meta.firma = einzeilig(get("firma")[0]);
  if (get("owner")[0]) meta.processOwner = einzeilig(get("owner")[0]);

  const schrittNodes = get("schritt").sort((a, b) => a.cx - b.cx);
  const schritte = schrittNodes.map((n, i) => {
    const zeilen = n.text.split("\n").map(s => s.trim()).filter(Boolean);
    return { id: "schritt_imp_" + i, titel: zeilen[0] || t("render.stepFallback", { n: i }), untertitel: zeilen.slice(1).join(" "), punkteUeberschrift: "", punkte: [], beschreibung: [] };
  });
  const rolleNodes = get("rolle").sort((a, b) => a.cy - b.cy);
  const rollen = rolleNodes.map(n => ({ id: NIJU.PROZESS.neueRollenId(), name: einzeilig(n) }));

  const raci = {};
  schritte.forEach(s => { raci[s.id] = {}; });
  get("raci").forEach(n => {
    if (!schrittNodes.length || !rolleNodes.length) return;
    let si = 0, best = Infinity;
    schrittNodes.forEach((s, i) => { const d = Math.abs(s.cx - n.cx); if (d < best) { best = d; si = i; } });
    let ri = 0; best = Infinity;
    rolleNodes.forEach((r, i) => { const d = Math.abs(r.cy - n.cy); if (d < best) { best = d; ri = i; } });
    const vorhanden = (n.text.toUpperCase().match(/[RACI]/g) || []);
    const buchstaben = ["R", "A", "C", "I"].filter(L => vorhanden.includes(L));
    if (buchstaben.length) raci[schritte[si].id][rollen[ri].id] = buchstaben;
  });

  const input = { label: "Input [Responsible]", punkte: get("input").sort((a, b) => a.cy - b.cy).map(einzeilig) };
  const output = { label: "Output [Responsible]", verantwortlich: "", punkte: get("output").sort((a, b) => a.cy - b.cy).map(einzeilig) };
  const legende = {
    "R": "Concept responsibility (Responsible)", "A": "Decision responsibility (Accountable)",
    "C": "Contribution responsibility (Consulted)", "I": "Right to be informed (Informed)"
  };
  return { meta, input, output, schritte, rollen, raci, legende };
}

/* Bestätigungs-Dialog anzeigen */
function zeigeImportDialog(nodes) {
  const alt = document.getElementById("importOverlay");
  if (alt) alt.remove();

  const overlay = el("div", "import-overlay"); overlay.id = "importOverlay";
  const dialog = el("div", "import-dialog");

  const kopf = el("div", "import-kopf");
  kopf.appendChild(el("h2", null, t("import.dialogTitle")));
  kopf.appendChild(el("p", null, t("import.dialogIntro")));
  dialog.appendChild(kopf);

  const body = el("div", "import-body");
  const tab = el("table", "import-tabelle");
  const thead = el("tr");
  ["import.colText", "import.colPosition", "import.colCategory"].forEach(k => thead.appendChild(el("th", null, t(k))));
  tab.appendChild(thead);

  const sortiert = nodes.slice().sort((a, b) => (a.y - b.y) || (a.x - b.x));
  const summeAktualisieren = () => {
    const z = {}; nodes.forEach(n => { z[n.kat] = (z[n.kat] || 0) + 1; });
    summe.textContent = t("import.summary", { steps: (z.schritt || 0), roles: (z.rolle || 0), raci: (z.raci || 0), input: (z.input || 0), output: (z.output || 0) });
  };

  sortiert.forEach(n => {
    const tr = el("tr");
    if (n.kat === "raci") tr.classList.add("ist-raci");
    tr.appendChild(el("td", "txt", n.text.replace(/\n/g, " ⏎ ")));
    tr.appendChild(el("td", "pos", "x " + Math.round(n.x) + " · y " + Math.round(n.y)));
    const tdK = el("td");
    const sel = document.createElement("select"); sel.className = "ed-select";
    IMPORT_KATEGORIEN.forEach(([v, key]) => { const o = document.createElement("option"); o.value = v; o.textContent = t(key); sel.appendChild(o); });
    sel.value = n.kat;
    sel.addEventListener("change", () => { n.kat = sel.value; tr.classList.toggle("ist-raci", n.kat === "raci"); summeAktualisieren(); });
    tdK.appendChild(sel);
    tr.appendChild(tdK);
    tab.appendChild(tr);
  });
  body.appendChild(tab);
  dialog.appendChild(body);

  const fuss = el("div", "import-fuss");
  const summe = el("div", "summe");
  fuss.appendChild(summe);
  const abbrechen = el("button", "btn-sek", t("import.cancel"));
  abbrechen.addEventListener("click", () => overlay.remove());
  const uebernehmen = el("button", "btn-akt", t("import.apply"));
  uebernehmen.addEventListener("click", () => {
    const daten = baueDatenAusNodes(nodes);
    overlay.remove();
    setDaten(daten);
    setAnsicht("uebersicht");
    if (!STATE.bearbeiten) setzeBearbeiten(true);
  });
  fuss.appendChild(abbrechen);
  fuss.appendChild(uebernehmen);
  dialog.appendChild(fuss);

  overlay.appendChild(dialog);
  document.body.appendChild(overlay);
  summeAktualisieren();
}

/* Import-Datei wählen + verarbeiten */
document.getElementById("btnImport").addEventListener("click", () => { schliesseMenu(); document.getElementById("drawioInput").click(); });
document.getElementById("drawioInput").addEventListener("change", (ev) => {
  const datei = ev.target.files[0];
  if (!datei) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const nodes = await leseDrawio(e.target.result);
      if (!nodes.length) { alert(t("msg.noTextFields")); return; }
      klassifiziere(nodes);
      zeigeImportDialog(nodes);
    } catch (err) {
      alert(t("msg.importFailed", { err: err.message }));
    }
  };
  reader.readAsText(datei, "utf-8");
  ev.target.value = "";
});

/* ---- Autocomplete: Funktions-/Rollennamen aus der Organisation ----
   Quelle 1: per "Organisation laden…" eingelesene index.json/organisation.json.
   Quelle 2: die im aktuellen Prozess bereits vorhandenen Rollen.
   Beides füllt das <datalist id="orgNamen"> für alle Rollen-Eingaben. */
let ORG_NAMEN = [];
function aktualisiereOrgNamen() {
  const liste = document.getElementById("orgNamen");
  if (!liste) return;
  const set = {}, out = [];
  ORG_NAMEN.forEach((n) => { n = (n || "").trim(); if (n && !set[n]) { set[n] = 1; out.push(n); } });
  ((STATE.daten && STATE.daten.rollen) || []).forEach((r) => { const n = rName(r).trim(); if (n && !set[n]) { set[n] = 1; out.push(n); } });
  out.sort((a, b) => a.localeCompare(b));
  liste.innerHTML = "";
  out.forEach((n) => { const o = document.createElement("option"); o.value = n; liste.appendChild(o); });
}
document.getElementById("btnLadeOrg").addEventListener("click", () => { schliesseMenu(); document.getElementById("orgInput").click(); });
document.getElementById("orgInput").addEventListener("change", (ev) => {
  const datei = ev.target.files[0];
  if (!datei) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    let obj = null;
    try { obj = JSON.parse(e.target.result); } catch (err) { alert(t("msg.jsonReadFailed", { err: err.message })); return; }
    /* Datei kann das ganze index.json sein (.organisation) oder direkt eine organisation */
    const org = (obj && obj.organisation) ? obj.organisation : obj;
    if (!org || !Array.isArray(org.knoten)) { alert(t("org.loadInvalid")); return; }
    ORG_NAMEN = NIJU.ORG.alleNamen(NIJU.ORG.normalize(org));
    aktualisiereOrgNamen();
    alert(t("org.loadedNames", { n: ORG_NAMEN.length }));
  };
  reader.readAsText(datei, "utf-8");
  ev.target.value = "";
});

/* ============================================================
   Configuration-Ansicht (eingebettet in die Bühne)
   ============================================================ */
function oeffneKonfiguration() {
  schliesseMenu();
  schliesseRaciMenu();
  const buehne = document.querySelector(".buehne");
  const editor = document.getElementById("editor");
  const host = document.getElementById("cfgHost");
  buehne.hidden = true;
  editor.hidden = true;
  host.hidden = false;
  NIJU.CONFIG.open(host, {
    design: true,
    backup: {
      getData: function () {
        if (!STATE.daten) return { prozesse: {}, index: null };
        const m = STATE.daten.meta || {};
        let fn = (m.prozessId || m.titel || "process").replace(/[/\\:*?"<>|]/g, "-").replace(/\s+/g, "-").toLowerCase();
        if (!fn) fn = "process";
        const prz = {};
        prz[fn + ".json"] = { data: STATE.daten, titel: m.titel || fn };
        return { prozesse: prz, index: null, name: "niju-builder-backup" };
      },
      onRestore: function (result) {
        if (result.settings) NIJU.BACKUP.applySettings(result.settings);
        NIJU.DESIGN.init(); NIJU.I18N.init();
        const keys = Object.keys(result.prozesse || {});
        if (keys.length) {
          const first = result.prozesse[keys[0]];
          setDaten((first && first.data) ? first.data : first);
        }
      }
    },
    onClose: () => {
      host.hidden = true; host.innerHTML = "";
      buehne.hidden = false;
      if (STATE.bearbeiten) editor.hidden = false;
      render(STATE.daten);
      requestAnimationFrame(passeBildschirmEin);
    }
  });
}
document.getElementById("btnConfig").addEventListener("click", oeffneKonfiguration);
