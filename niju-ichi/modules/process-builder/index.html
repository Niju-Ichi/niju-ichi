<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIJU ICHI Process Builder — RACI Process Overview</title>
<link rel="stylesheet" href="../../shared/css/base.css">
<script src="../../shared/js/i18n.js"></script>
<script src="../../shared/lang/en.js"></script>
<script src="../../shared/lang/de.js"></script>
<script src="../../shared/lang/ja.js"></script>
<script src="../../shared/js/modules.js"></script>
<script src="../../shared/js/nav.js"></script>
<script src="../../shared/js/design.js"></script>
<script src="../../shared/design/swiss-modular.js"></script>
<script src="../../shared/design/teal-soft.js"></script>
<script src="../../shared/design/mono-slate.js"></script>
<script src="../../shared/design/strategy-editorial.js"></script>
<script src="../../shared/design/executive-dark.js"></script>
<script src="../../shared/js/config.js"></script>
<script src="../../shared/js/prozess.js"></script>
<script src="../../shared/js/backup.js"></script>
<script src="../../shared/js/org.js"></script>
<style>
  /* ============================================================
     NIJU ICHI Process Builder — Layout "Swiss Modular"
     Komplett offline, kein Build-Schritt, keine externen Quellen.
     ============================================================ */

  :root {
    /* RACI-Badge-Farben (gemäß Vorlage) */
    --raci-R: #e0850f;   --raci-R-text: #ffffff;  /* orange  = Responsible */
    --raci-A: #2e9e4f;   --raci-A-text: #ffffff;  /* grün    = Accountable */
    --raci-C: #3479c9;   --raci-C-text: #ffffff;  /* blau    = Consulted   */
    --raci-I: #1f3a66;   --raci-I-text: #ffffff;  /* navy    = Informed    */

    --ink:        #16181d;   /* Headlines, Regeln, Chip, dunkle Seitenleiste */
    --paper:      #ffffff;
    --sidebar:    #16181d;   /* dunkle Meta-Seitenleiste */
    --muted:      #8b919b;   /* Mikro-Labels auf Weiß */
    --muted-dark: #9aa3b1;   /* Mikro-Labels auf Dunkel */
    --body:       #3a3f47;   /* Fließtext */
    --akzent:     #3479c9;   /* Akzentblau (Chip-Wort, Output-Owner, Bullets) */

    --rule:        #e3e6ea;  /* feine Linien (Spalten/Zeilen) */
    --rule-mid:    #c7ccd3;  /* Rollen-/Meta-Trenner */
    --rule-strong: #16181d;  /* schwere schwarze Trennregeln */
    --zebra:       #f1f3f5;
    --num-soft:    #c4c9d0;  /* große, dezente Schrittnummer (Prozessbereich) */
    --verbinder:   #b3bbc5;  /* RACI-Verbinderlinien */

    --mono: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: "Helvetica Neue", Helvetica, Arial, "Segoe UI", sans-serif;

    /* UI-Akzent (Chrome): aktive Buttons, SATS-Menü, NIJU-ICHI-Schriftzug.
       Marken-Orange aus der Startgrafik — getrennt vom RACI-„R"-Badge. */
    --ui-akzent: #fd5e02;  --ui-akzent-text: #ffffff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }
  /* Arbeitsbereich: optionales Editor-Panel links, Vorschau rechts */
  .app { flex: 1; display: flex; min-height: 0; }

  /* ---------- Werkzeugleiste (nur Bildschirm) ---------- */
  .toolbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 16px; background: #1b1f25; color: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  .toolbar .spacer { flex: 1; }
  .btn {
    appearance: none; border: 1px solid #3a4250; background: #2a313b; color: #fff;
    padding: 6px 11px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit;
    white-space: nowrap;
  }
  .btn:hover { background: #353d48; }
  /* Aktiver/hervorgehobener Button = Marken-Orange (UI-Akzent) */
  .btn.primary { background: var(--ui-akzent); border-color: var(--ui-akzent); }
  .btn.primary:hover { filter: brightness(1.08); }
  .toolbar .marke { font-size: 14px; font-weight: 700; letter-spacing: .04em; color: #fff; white-space: nowrap; }
  .toolbar .marke-akz { color: var(--ui-akzent); }

  /* Hamburger-Menü oben links */
  .menu-wrap { position: relative; display: flex; }
  .btn.icon { padding: 5px 9px; line-height: 0; color: var(--ui-akzent); }
  .sats-icon { display: block; }
  .menu-dropdown {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 60;
    background: #2a313b; border: 1px solid #3a4250; border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); padding: 6px; min-width: 170px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .menu-dropdown[hidden] { display: none; }
  .menu-item {
    appearance: none; text-align: left; background: transparent; border: 0; color: #fff;
    padding: 8px 11px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .menu-item:hover { background: #353d48; }
  /* Untermenüs (Flyout nach rechts) */
  .menu-sub { position: relative; display: flex; flex-direction: column; }
  .menu-item.has-sub { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .menu-item.has-sub::after { content: "▸"; font-size: 11px; color: #9aa1ad; }
  .submenu {
    position: absolute; left: 100%; top: -6px; z-index: 70;
    background: #2a313b; border: 1px solid #3a4250; border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); padding: 6px; min-width: 150px;
    display: none; flex-direction: column; gap: 3px;
  }
  .menu-sub:hover > .submenu, .menu-sub.auf > .submenu { display: flex; }

  /* Ansichts-Navigation + Schritt-Dropdown */
  .tb-trenner { width: 1px; align-self: stretch; background: #3a4250; margin: 2px 4px; }
  .tb-nav { display: flex; align-items: center; gap: 7px; }
  .tb-lab { font-size: 12px; color: #9aa1ad; white-space: nowrap; }
  .btn.seg { background: #22272f; }
  .btn.seg.aktiv { background: var(--ui-akzent); border-color: var(--ui-akzent); }
  .toolbar select {
    appearance: none; background: #2a313b; color: #fff; border: 1px solid #3a4250;
    border-radius: 6px; padding: 6px 10px; font-size: 13px; font-family: inherit; max-width: 230px;
  }
  .toolbar select:disabled { opacity: .4; cursor: default; }

  /* ---------- Bühne / Blatt ---------- */
  .buehne {
    flex: 1; min-width: 0;
    padding: 22px; overflow: auto;
    background: linear-gradient(180deg,#586272 0%,#4c5562 100%);
  }

  /* Skalierungs-Hülle: nimmt die *skalierte* Größe ein (per JS gesetzt),
     zentriert das Blatt und vermeidet Layout-Überlauf. */
  .blatt-wrap { position: relative; margin: 0 auto; }

  /* A3 quer; Inhalt oben ausgerichtet, viel Weißraum (Swiss-Stil).
     Bildschirm-Skalierung über transform:scale (browserstabil, skaliert
     das SVG der Verbinder 1:1 mit) statt des nicht-standardisierten zoom. */
  .blatt {
    background: var(--paper);
    width: 392mm;
    min-height: 120mm;
    position: absolute; top: 0; left: 0;
    padding: 12mm 13mm 10mm;
    box-shadow: 0 10px 30px rgba(15,23,42,.28), 0 2px 6px rgba(15,23,42,.18);
    display: flex; flex-direction: column;
    transform-origin: top left;
  }

  /* SVG-Ebene mit den RACI-Verbindern (über den Feldern, unter den Badges). */
  #verbinder {
    position: absolute; inset: 0; width: 100%; height: 100%;
    z-index: 1; pointer-events: none; overflow: visible;
  }
  #verbinder line {
    stroke: var(--verbinder); stroke-width: 1.4; stroke-linecap: round;
    vector-effect: non-scaling-stroke;
  }

  /* ---------- Eyebrow / Top-Strip ---------- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 7px;
    position: relative;  /* Anker für absolut positioniertes Firma-Logo */
  }
  .topbar .ak { color: var(--akzent); }
  .topbar .tb-r { display: flex; align-items: center; gap: 14px; }
  .topbar .vinfo b { color: var(--ink); font-weight: 700; }
  .topbar .chip {
    background: var(--sidebar); color: #fff; font-weight: 700;
    letter-spacing: .12em; padding: 4px 9px; border-radius: 2px;
  }

  /* ---------- Titel ---------- */
  .titel { border-bottom: 2.5px solid var(--ink); padding-bottom: 10px; margin-bottom: 0; }
  .titel h1 { margin: 0; font-size: 33px; font-weight: 800; letter-spacing: -.015em; line-height: 1.04; }
  .titel .t1 { color: var(--ink); }
  .titel .t2 { color: #aab0b8; font-weight: 700; }

  /* ============================================================
     Haupt-Raster
     ============================================================ */
  .raster { display: grid; }  /* Spalten per JS */

  .zelle { padding: 9px 11px; overflow-wrap: anywhere; }

  /* ----- dunkle Meta-Seitenleiste -----
     Ein durchgehendes Panel über beide Bänder (grid-row 1/3).
     Die vier Gruppen (ID, Owner, Input, Output) werden über die volle
     Höhe verteilt -> kein Leerraum am unteren Ende, gleichmäßiger Rhythmus. */
  .meta {
    background: var(--sidebar); color: #fff;
    padding: 17px 18px;
    display: flex; flex-direction: column;
    justify-content: space-between; gap: 16px;
  }
  .mgroup { display: block; }
  .mlabel {
    font-family: var(--mono);
    font-size: 8.5px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--muted-dark); margin: 0 0 5px;
  }
  .mval-id { font-family: var(--mono); font-size: 12.5px; color: #fff; line-height: 1.4; }
  .mval { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.35; }
  .mval.akzent { color: #5fa0e6; margin-bottom: 6px; }

  ul.mliste { list-style: none; margin: 0; padding: 0; }
  ul.mliste > li { position: relative; padding-left: 14px; margin-bottom: 9px; }
  ul.mliste > li:last-child { margin-bottom: 0; }
  ul.mliste > li::before {
    content: ""; position: absolute; left: 0; top: .46em;
    width: 5px; height: 5px; background: var(--akzent);
  }
  ul.mliste .mtext { font-size: 12px; color: #eef1f5; line-height: 1.4; }
  ul.mliste .mtag {
    display: block; font-family: var(--mono); font-size: 8.5px;
    letter-spacing: .12em; text-transform: uppercase; color: var(--muted-dark); margin-top: 3px;
  }

  /* ----- Schritt-Kopf ----- */
  .schritt-kopf {
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding-bottom: 9px;
  }
  .sk-top { display: flex; align-items: baseline; gap: 9px; }
  .sk-num { font-size: 26px; font-weight: 800; color: var(--num-soft); line-height: 1; letter-spacing: -.02em; }
  .sk-lab { font-family: var(--mono); font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
  .sk-sub { margin-top: 6px; font-size: 12.5px; font-weight: 700; color: var(--ink); line-height: 1.22; }

  /* ----- Schritt-Inhalt ----- */
  .schritt-inhalt { border-right: 1px solid var(--rule); }
  .si-lab {
    font-family: var(--mono); font-size: 8.5px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  ul.liste { list-style: none; margin: 0; padding: 0; }
  ul.liste > li { position: relative; padding-left: 13px; margin-bottom: 5px; }
  ul.liste > li::before {
    content: ""; position: absolute; left: 0; top: .42em;
    width: 5px; height: 5px; background: var(--ink);
  }
  ul.liste > li > .txt { font-size: 11px; color: var(--body); line-height: 1.32; }
  ul.liste ul { list-style: none; margin: 3px 0 0; padding: 0; }
  ul.liste ul li { position: relative; padding-left: 13px; margin-bottom: 2px; }
  ul.liste ul li::before {
    content: ""; position: absolute; left: 0; top: .45em;
    width: 4px; height: 4px; border-radius: 50%; background: var(--ink);
  }
  ul.liste ul li { font-size: 10px; color: var(--body); line-height: 1.3; }
  /* Block-Folge im Schritt (Phase B): Abstand zwischen Blöcken + freier Textabsatz */
  .si-block + .si-block { margin-top: 8px; }
  .si-absatz { font-size: 11px; color: var(--body); line-height: 1.32; }

  /* ============================================================
     RACI-Bereich
     ============================================================ */
  .raci-head {
    grid-column: 1 / -1;
    border-top: 2.5px solid var(--ink);
    padding: 12px 0 10px;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
  }
  .rh-titel { font-size: 16px; font-weight: 800; color: var(--ink); letter-spacing: -.01em; }
  .rh-sub {
    display: block; margin-top: 3px;
    font-family: var(--mono); font-size: 8.5px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--muted); font-weight: 400;
  }
  .legende { display: flex; gap: 22px; flex-wrap: wrap; }
  .legende .leg-item { display: flex; align-items: center; gap: 8px; }
  .legende .leg-txt { display: flex; flex-direction: column; line-height: 1.15; }
  .legende .leg-txt b { font-size: 10.5px; font-weight: 700; color: var(--ink); }
  .legende .leg-txt i {
    font-family: var(--mono); font-style: normal; font-size: 8px;
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
  }

  /* RACI-Spaltenkopf (00–04 schwarz) */
  .raci-num {
    text-align: center; padding: 6px 4px 7px;
    border-bottom: 1.5px solid var(--ink);
  }
  .rn-num { display: block; font-size: 19px; font-weight: 800; color: var(--ink); line-height: 1; letter-spacing: -.02em; }
  .rn-lab { display: block; margin-top: 3px; font-family: var(--mono); font-size: 8px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
  .raci-corner { border-bottom: 1.5px solid var(--ink); border-right: 1px solid var(--rule-mid); }

  /* Rollen-Spalte + Matrix-Zellen */
  .raci-rolle {
    display: flex; align-items: center; justify-content: flex-end; text-align: right;
    font-size: 11px; font-weight: 700; color: var(--ink);
    padding: 0 12px; border-right: 1px solid var(--rule-mid);
  }
  .raci-zelle { position: relative; min-height: 30px; padding: 0; }
  .rrow-1 .raci-zelle, .raci-zelle.rrow-1 { background: var(--zebra); }
  .rrow-1.raci-rolle { background: var(--zebra); }

  /* Badges (quadratisch, flach) */
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 2px;
    font-size: 11px; font-weight: 700; line-height: 1;
  }
  .raci-zelle .badge { position: absolute; top: 50%; transform: translate(-50%, -50%); z-index: 3; }
  .raci-zelle .slot-C { left: 26%; }
  .raci-zelle .slot-R { left: 42%; }
  .raci-zelle .slot-A { left: 58%; }
  .raci-zelle .slot-I { left: 74%; }
  .badge-R { background: var(--raci-R); color: var(--raci-R-text); }
  .badge-A { background: var(--raci-A); color: var(--raci-A-text); }
  .badge-C { background: var(--raci-C); color: var(--raci-C-text); }
  .badge-I { background: var(--raci-I); color: var(--raci-I-text); }

  /* ---------- Fuß ---------- */
  .footer {
    margin-top: 14px; padding-top: 8px; border-top: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    font-family: var(--mono); font-size: 8.5px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted);
  }
  .footer b { color: var(--ink); font-weight: 700; }

  .leer-hinweis { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 15px; }

  /* ============================================================
     Editor-Panel (nur Bildschirm)
     ============================================================ */
  .editor {
    flex: 0 0 440px; width: 440px; overflow-y: auto;
    background: #eef1f4; border-right: 1px solid #cfd5dc;
    color: var(--ink); font-size: 13px;
    /* Editor-Formular ist Bedienoberfläche auf hellem Grund: Standard-Ink
       beibehalten, auch wenn ein dunkles Design --ink global auf hell setzt
       (das Blatt #blatt liegt außerhalb von .editor und folgt dem Design). */
    --ink: #16181d;
  }
  .editor[hidden] { display: none; }
  body.bearbeiten .btn#btnBearbeiten { background: var(--ui-akzent); border-color: var(--ui-akzent); }

  .ed-inner { padding: 14px 16px 60px; }
  .ed-section { margin-bottom: 18px; border: 1px solid #d6dbe1; border-radius: 8px; background: #fff; overflow: hidden; }
  .ed-h {
    margin: 0; padding: 9px 12px; cursor: pointer;
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 700;
    color: #fff; background: var(--sidebar);
    display: flex; align-items: center; justify-content: space-between;
  }
  .ed-h .pfeil { transition: transform .15s; font-size: 10px; }
  .ed-section.zu .pfeil { transform: rotate(-90deg); }
  .ed-section.zu .ed-body { display: none; }
  .ed-body { padding: 12px; }

  .ed-field { margin-bottom: 10px; }
  .ed-field:last-child { margin-bottom: 0; }
  .ed-field > label {
    display: block; margin-bottom: 3px;
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
  }
  .ed-field input[type=text], .ed-field textarea {
    width: 100%; padding: 6px 8px; border: 1px solid #c7ccd3; border-radius: 5px;
    font-family: inherit; font-size: 13px; color: var(--ink); background: #fff;
  }
  .ed-field input:focus, .ed-field textarea:focus, .ed-select:focus { outline: none; border-color: var(--akzent); }
  .ed-field textarea { resize: vertical; min-height: 34px; line-height: 1.35; }
  .ed-select {
    width: 100%; padding: 6px 8px; border: 1px solid #c7ccd3; border-radius: 5px;
    font-family: inherit; font-size: 13px; color: var(--ink); background: #fff;
  }
  .ed-check { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); margin: 4px 0 8px; cursor: pointer; }
  .ed-file { width: 100%; font-size: 12px; }
  .logo-vorschau { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
  .logo-vorschau img { max-height: 44px; max-width: 150px; border: 1px solid #d6dbe1; border-radius: 4px; background: #fff; padding: 3px; object-fit: contain; }

  /* Firma-Logo oben rechts in der Kopfzeile (Blatt)
     Absolut positioniert → nimmt keinen Platz im Flex-Flow ein, das Seiten-Layout
     (Titel, Raster usw.) wird nicht verschoben.
     - right:0 → bündig mit der rechten Inhaltskante.
     - Höhe bewusst kleiner als die Kopfzeile; per top-Offset so platziert, dass die
       UNTERKANTE des Logos mit der Unterkante des Titels (h1) fluchtet, ohne darüber
       hinauszuragen. Übersicht: Titelunterkante liegt 60 px unter der Topbar-Oberkante
       → top:16 + height:44 = 60. Detail: 55 px → top:15 + height:40 = 55.
     - object-fit:contain + object-position:right top → nicht-quadratische Logos werden
       ohne Verzerrung oben/rechts ausgerichtet (Rest-Weißraum fällt nach unten/links). */
  .topbar .firma-logo {
    position: absolute; right: 0; top: 16px;
    height: 44px; width: 44px;
    display: block; object-fit: contain; object-position: right top;
  }
  .blatt.detail .topbar .firma-logo { top: 15px; height: 40px; width: 40px; }

  /* ============================================================
     draw.io-Import — Bestätigungs-Dialog (nur Bildschirm)
     ============================================================ */
  .import-overlay {
    position: fixed; inset: 0; z-index: 300; background: rgba(20,24,30,.55);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .import-overlay[hidden] { display: none; }
  .import-dialog {
    background: #fff; border-radius: 12px; width: min(960px, 94vw); max-height: 88vh;
    display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.4); color: var(--ink);
  }
  .import-kopf { padding: 16px 22px; border-bottom: 1px solid var(--rule); }
  .import-kopf h2 { margin: 0; font-size: 18px; font-weight: 800; }
  .import-kopf p { margin: 6px 0 0; font-size: 12.5px; color: var(--muted); line-height: 1.4; }
  .import-body { padding: 6px 22px 12px; overflow: auto; }
  .import-tabelle { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .import-tabelle th {
    text-align: left; position: sticky; top: 0; background: #fff; z-index: 1;
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    padding: 8px 8px; border-bottom: 1.5px solid var(--ink);
  }
  .import-tabelle td { border-bottom: 1px solid var(--rule); padding: 6px 8px; vertical-align: middle; }
  .import-tabelle td.pos { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
  .import-tabelle td.txt { max-width: 360px; overflow-wrap: anywhere; }
  .import-tabelle tr.ist-raci td.txt { font-weight: 700; }
  .import-fuss { padding: 14px 22px; border-top: 1px solid var(--rule); display: flex; align-items: center; gap: 10px; }
  .import-fuss .summe { flex: 1; font-size: 12px; color: var(--muted); }
  .import-fuss .btn-akt {
    appearance: none; border: 1px solid var(--ui-akzent); background: var(--ui-akzent); color: #fff;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit;
  }
  .import-fuss .btn-akt:hover { filter: brightness(1.08); }
  .import-fuss .btn-sek {
    appearance: none; border: 1px solid #c7ccd3; background: #f5f7f9; color: var(--ink);
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .import-fuss .btn-sek:hover { background: #e7ebef; }

  /* HTML-Stapel-Auswahl (Liste mit Checkboxen) */
  .batch-liste { max-height: 46vh; overflow: auto; border: 1px solid var(--rule); border-radius: 7px; }
  .batch-row {
    display: flex; align-items: center; gap: 11px; padding: 9px 12px; cursor: pointer;
    border-bottom: 1px solid var(--rule);
  }
  .batch-row:last-child { border-bottom: 0; }
  .batch-row:hover { background: #f5f7f9; }
  .batch-row input[type=checkbox] { width: 16px; height: 16px; flex: none; }
  .batch-txt { min-width: 0; }
  .batch-titel { font-size: 13px; font-weight: 700; color: var(--ink); line-height: 1.25; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .batch-datei { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .ed-row { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 6px; }
  .ed-row .grow { flex: 1; min-width: 0; }
  .ed-2col { display: flex; gap: 8px; }
  .ed-2col > * { flex: 1; }

  .mini {
    appearance: none; border: 1px solid #c7ccd3; background: #f5f7f9; color: var(--ink);
    border-radius: 5px; cursor: pointer; font-size: 12px; font-family: inherit;
    padding: 5px 9px; line-height: 1; white-space: nowrap;
  }
  .mini:hover { background: #e7ebef; }
  .mini.del { color: #b3261e; border-color: #e3b9b5; background: #fbeeed; }
  .mini.del:hover { background: #f6dedb; }
  .mini.add { color: var(--akzent); border-color: #b8d0ec; background: #eef5fc; font-weight: 600; }
  .mini.add:hover { background: #e0edfa; }
  .mini:disabled { opacity: .35; cursor: default; }

  .ed-item { border: 1px solid #dfe3e8; border-radius: 7px; padding: 10px; margin-bottom: 10px; background: #fafbfc; }
  .ed-item-kopf { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ed-item-kopf .titel { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--akzent); }
  .ed-item-kopf .werkz { display: flex; gap: 4px; }

  .ed-punkt { border-left: 2px solid #d6dbe1; padding-left: 8px; margin-bottom: 8px; }
  .ed-unter { margin: 4px 0 0 10px; }
  .ed-unter .ed-row input { font-size: 12px; }
  .ed-hint { font-size: 11px; color: var(--muted); margin: 2px 0 8px; }

  /* ============================================================
     Editor redesign — icon buttons, hover-reveal, block headers,
     popover menus, segment toggle. Themed via the design variables.
     ============================================================ */
  .ic { width: 16px; height: 16px; display: inline-block; flex: none; pointer-events: none; }

  /* 28x28 icon button: transparent, muted → ink on hover (per spec §5.3). */
  .ed-iconbtn {
    appearance: none; border: 0; background: transparent; color: var(--muted);
    width: 28px; height: 28px; padding: 0; border-radius: 6px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .12s, color .12s, opacity .12s;
  }
  .ed-iconbtn:hover { background: var(--zebra); color: var(--ink); }
  .ed-iconbtn:focus-visible { outline: 2px solid var(--akzent); outline-offset: 1px; color: var(--ink); }
  .ed-iconbtn:disabled { opacity: .3 !important; cursor: default; pointer-events: none; }
  .ed-tools { display: inline-flex; align-items: center; gap: 1px; flex: none; }

  /* Hover-Reveal: Griff + Aktionen erst bei :hover ODER :focus-within sichtbar
     (Tastatur-Nutzer!). Im Ruhezustand unsichtbar und nicht klickbar. */
  .ed-row .ed-reveal, .ed-item-kopf .ed-reveal, .ed-block-h .ed-reveal {
    opacity: 0; pointer-events: none;
  }
  .ed-row:hover .ed-reveal, .ed-row:focus-within .ed-reveal,
  .ed-item-kopf:hover .ed-reveal, .ed-item-kopf:focus-within .ed-reveal,
  .ed-block-h:hover .ed-reveal, .ed-block-h:focus-within .ed-reveal,
  .ed-block:focus-within > .ed-block-h .ed-reveal {
    opacity: 1; pointer-events: auto;
  }

  /* Drag-Griff */
  .ed-grip { cursor: grab; color: var(--muted); }
  .ed-grip:active { cursor: grabbing; }
  .ed-row.ed-dragging, .ed-block.ed-dragging { opacity: .45; }
  .ed-drop-before { box-shadow: inset 0 2px 0 0 var(--akzent); }
  .ed-drop-after  { box-shadow: inset 0 -2px 0 0 var(--akzent); }

  /* Inhaltsblock mit Header-Streifen (Absatz / Liste / Zwischenüberschrift) */
  .ed-block { border: 1px solid var(--rule); border-radius: 8px; background: var(--paper); margin-bottom: 8px; }
  .ed-block-h { display: flex; align-items: center; gap: 5px; padding: 4px 5px 4px 2px; }
  .ed-chev { color: var(--muted); }
  .ed-typebadge {
    font-family: var(--mono); font-size: 8.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); background: var(--zebra); border-radius: 4px; padding: 2px 6px; flex: none;
  }
  .ed-block-sum { flex: 1; min-width: 0; font-size: 11.5px; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ed-block-body { padding: 4px 8px 9px; }
  .ed-block.zu .ed-block-body { display: none; }
  .ed-block.zu .ed-block-sum { display: block; }
  .ed-block:not(.zu) .ed-block-sum { visibility: hidden; }

  /* Popover-Menü (⋯ Overflow, + Block) — einfaches positioniertes div, kein Framework */
  .ed-pop {
    position: absolute; z-index: 60; min-width: 168px; padding: 4px;
    background: var(--paper); border: 1px solid var(--rule); border-radius: 8px;
    box-shadow: 0 10px 28px rgba(15,23,42,.22);
  }
  .ed-pop button {
    display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
    appearance: none; border: 0; background: transparent; color: var(--ink);
    font-family: inherit; font-size: 12.5px; padding: 7px 9px; border-radius: 5px; cursor: pointer;
  }
  .ed-pop button .ic { color: var(--muted); }
  .ed-pop button:hover { background: var(--zebra); }
  .ed-pop hr { border: 0; border-top: 1px solid var(--rule); margin: 4px 2px; }

  /* Segment-Toggle (2 Spalten | 1) */
  .ed-seg { display: inline-flex; border: 1px solid var(--rule); border-radius: 6px; overflow: hidden; flex: none; }
  .ed-seg button {
    appearance: none; border: 0; background: transparent; color: var(--muted);
    font-family: inherit; font-size: 10.5px; letter-spacing: .02em; padding: 3px 8px; cursor: pointer;
  }
  .ed-seg button + button { border-left: 1px solid var(--rule); }
  .ed-seg button.an { background: var(--akzent); color: #fff; }

  /* Dezente Ghost-Aktion am Listenende / „+ Block hinzufügen" */
  .ed-ghost {
    appearance: none; width: 100%; text-align: left; cursor: pointer;
    border: 1px dashed var(--rule-strong, var(--rule)); border-radius: 6px; background: transparent;
    color: var(--muted); font-family: inherit; font-size: 12px; padding: 7px 10px;
    display: inline-flex; align-items: center; gap: 8px; transition: color .12s, border-color .12s;
  }
  .ed-ghost:hover { color: var(--akzent); border-color: var(--akzent); }
  .ed-ghost .kbd { margin-left: auto; font-family: var(--mono); font-size: 9.5px; color: var(--muted); }

  /* Auto-grow Textarea (Absatz): Höhe = Inhalt */
  textarea.ed-grow { overflow: hidden; resize: none; }

  /* Listenpunkt-Zeilen im Block-Body + eingerückte Unterpunkte (max. 2 Ebenen) */
  .ed-row { align-items: center; }
  .ed-sub { margin-left: 22px; }
  .ed-block-body .ed-row, .ed-item .ed-row { margin-bottom: 4px; }
  .ed-block-body .ed-ghost, .ed-item .ed-ghost { margin-top: 2px; }

  /* RACI im Blatt anklickbar machen */
  .blatt.bearbeiten .raci-zelle.editierbar {
    cursor: pointer; box-shadow: inset 0 0 0 1px transparent;
  }
  .blatt.bearbeiten .raci-zelle.editierbar:hover { background: #eaf2fc; box-shadow: inset 0 0 0 1px var(--akzent); }

  /* RACI-Popover */
  .raci-menu {
    position: fixed; z-index: 200; background: #fff; border: 1px solid #c7ccd3;
    border-radius: 8px; box-shadow: 0 8px 24px rgba(15,23,42,.22); padding: 8px;
    display: flex; gap: 6px;
  }
  .raci-menu .rm-btn {
    width: 34px; height: 34px; border-radius: 6px; border: 2px solid transparent;
    cursor: pointer; font-weight: 700; font-size: 13px; color: #fff; opacity: .32;
    font-family: inherit; transition: opacity .1s;
  }
  .raci-menu .rm-btn:hover { opacity: .7; }
  .raci-menu .rm-btn.an { opacity: 1; border-color: var(--ink); }
  .raci-menu .rm-R { background: var(--raci-R); }
  .raci-menu .rm-A { background: var(--raci-A); }
  .raci-menu .rm-C { background: var(--raci-C); }
  .raci-menu .rm-I { background: var(--raci-I); }

  /* ============================================================
     Detailseite (A4 quer) — alles unter .blatt.detail gescoped,
     damit es nicht mit dem Übersichts-Layout kollidiert.
     ============================================================ */
  .blatt.detail {
    /* +25% sheet width (281mm → 351mm). The extra width goes ENTIRELY into the
       right (text) column: the left column (RACI matrix + legend), the vertical
       divider and the right outer margin stay unchanged. --detail-links =
       previous width of the left column (was 0.86fr of 255mm). */
    --detail-links: 109.54mm;
    width: 351mm; min-height: 188mm; padding: 9mm 13mm 7mm;
  }
  .blatt.detail .titel { padding-bottom: 8px; }
  .blatt.detail .titel h1 {
    font-size: 28px; font-weight: 800; letter-spacing: -.015em; line-height: 1.05; color: var(--ink);
  }
  .blatt.detail .badge { width: 22px; height: 22px; font-size: 12px; }

  .koerper {
    flex: 1; display: grid;
    grid-template-columns: var(--detail-links, 109.54mm) minmax(0, 1fr);
    margin-top: 11px;
  }
  .spalte-links  { padding-right: 26px; display: flex; flex-direction: column; }
  .spalte-rechts { padding-left: 28px; border-left: 1.5px solid var(--ink); }

  .abschnitt-lab {
    font-family: var(--mono); font-size: 9px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--akzent); margin-bottom: 11px;
  }
  .abschnitt-lab .dim { color: var(--muted); }

  .raci-matrix { position: relative; display: grid; grid-template-columns: minmax(110px, 1fr) minmax(150px, 1.15fr); }
  .rm-corner { border-bottom: 1.5px solid var(--ink); }
  .rm-kopf { text-align: center; padding: 2px 4px 7px; border-bottom: 1.5px solid var(--ink); }
  .rm-rolle {
    display: flex; align-items: center; justify-content: flex-end; text-align: right;
    font-size: 11.5px; font-weight: 700; color: var(--ink);
    padding: 0 14px; border-right: 1px solid var(--rule-mid);
  }
  .rm-zelle { position: relative; min-height: 38px; }
  .rm-rolle.stripe, .rm-zelle.stripe { background: var(--zebra); }
  .rm-zelle .badge { position: absolute; top: 50%; transform: translate(-50%, -50%); z-index: 3; }
  .rm-zelle .slot-C { left: 26%; }
  .rm-zelle .slot-R { left: 42%; }
  .rm-zelle .slot-A { left: 58%; }
  .rm-zelle .slot-I { left: 74%; }

  .blatt.detail.bearbeiten .rm-zelle.editierbar { cursor: pointer; box-shadow: inset 0 0 0 1px transparent; }
  .blatt.detail.bearbeiten .rm-zelle.editierbar:hover { background: #eaf2fc; box-shadow: inset 0 0 0 1px var(--akzent); }

  .leg-trenner { border: 0; border-top: 1px solid var(--rule); margin: auto 0 14px; }
  .blatt.detail .legende { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 22px; }
  .blatt.detail .legende .leg-item { align-items: flex-start; gap: 9px; }
  .blatt.detail .legende .leg-txt b { font-size: 11px; }
  .blatt.detail .legende .leg-txt i { font-size: 8.5px; letter-spacing: .04em; text-transform: none; }

  .beschr-block { display: grid; grid-template-columns: 46px 1fr; gap: 16px; padding: 11px 0; }
  .beschr-block:first-of-type { padding-top: 0; }
  .beschr-block + .beschr-block { border-top: 1px solid var(--rule); }
  .bb-badge {
    width: 38px; height: 38px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 21px; font-weight: 800; line-height: 1;
  }
  .bb-badge.R { background: var(--raci-R); color: var(--raci-R-text); }
  .bb-badge.A { background: var(--raci-A); color: var(--raci-A-text); }
  .bb-badge.C { background: var(--raci-C); color: var(--raci-C-text); }
  .bb-badge.I { background: var(--raci-I); color: var(--raci-I-text); }
  .bb-eyebrow { font-family: var(--mono); font-size: 8.5px; letter-spacing: .14em; text-transform: uppercase; margin-bottom: 4px; }
  .bb-eyebrow.R { color: var(--raci-R); } .bb-eyebrow.A { color: var(--raci-A); }
  .bb-eyebrow.C { color: var(--raci-C); } .bb-eyebrow.I { color: var(--raci-I); }
  .bb-eyebrow .dim { color: var(--muted); }
  .bb-titel { font-size: 15.5px; font-weight: 800; color: var(--ink); letter-spacing: -.01em; line-height: 1.12; margin-bottom: 5px; }
  .bb-p { font-size: 11px; color: var(--body); line-height: 1.4; margin: 0 0 5px; }
  .bb-p:last-child { margin-bottom: 0; }
  .bb-p strong { color: var(--ink); font-weight: 700; }
  ul.bb-liste { list-style: none; margin: 4px 0 7px; padding: 0; }
  ul.bb-liste.spalten2 { column-count: 2; column-gap: 26px; }
  ul.bb-liste > li { position: relative; padding-left: 14px; margin-bottom: 4px; break-inside: avoid; font-size: 11px; color: var(--body); line-height: 1.34; }
  ul.bb-liste > li::before { content: ""; position: absolute; left: 0; top: .42em; width: 5px; height: 5px; background: var(--ink); }
  ul.bb-liste ul { list-style: none; margin: 2px 0 0; padding: 0; }
  ul.bb-liste ul li { position: relative; padding-left: 13px; margin-bottom: 2px; font-size: 10px; color: var(--body); line-height: 1.3; }
  ul.bb-liste ul li::before { content: ""; position: absolute; left: 0; top: .45em; width: 4px; height: 4px; border-radius: 50%; background: var(--ink); }

  /* ============================================================
     Druck / PDF — Seitengröße wird per JS gesetzt (#druckGroesse):
     Übersicht = A3 quer, Detail = A4 quer.
     ============================================================ */
  @media print {
    html, body { background: #fff; height: auto; overflow: visible; display: block; }
    .toolbar, .editor, .raci-menu { display: none !important; }
    .app { display: block; min-height: 0; }
    .buehne { padding: 0; overflow: visible; background: #fff; }
    /* Im Druck: natürliche Größe, kein transform/keine Hüllen-Maße. */
    .blatt-wrap { width: auto !important; height: auto !important; overflow: visible; }
    .blatt {
      position: static !important; transform: none !important;
      box-shadow: none; min-height: auto;
    }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .raster, .beschr-block { break-inside: avoid; }
  }
</style>

/* Eingebettetes Standard-Template (inhaltsgleich zu data/templates/standard.json),
   damit "Neuer Prozess" auch per Doppelklick ohne Server offline funktioniert.
   Bei Änderungen beide synchron halten. */
const TEMPLATE_LEER = {
  "meta": { "titel": "New process overview", "firma": "", "firmaModus": "text", "logo": "", "prozessId": "", "version": "1.0", "datum": "", "processOwner": "", "fusstext": "" },
  "input": { "label": "Input [Responsible]", "punkte": [""] },
  "output": { "label": "Output [Responsible]", "verantwortlich": "", "punkte": [""] },
  "schritte": [
    { "id": "standards", "kopfId": "", "titel": "Standards", "untertitel": "", "punkteUeberschrift": "Standards to develop:", "punkte": [{ "text": "" }], "beschreibung": [] },
    { "id": "schritt1", "kopfId": "", "titel": "Process step 1", "untertitel": "", "punkteUeberschrift": "This includes:", "punkte": [{ "text": "" }], "beschreibung": [] },
    { "id": "schritt2", "kopfId": "", "titel": "Process step 2", "untertitel": "", "punkteUeberschrift": "This includes:", "punkte": [{ "text": "" }], "beschreibung": [] },
    { "id": "schritt3", "kopfId": "", "titel": "Process step 3", "untertitel": "", "punkteUeberschrift": "This includes:", "punkte": [{ "text": "" }], "beschreibung": [] },
    { "id": "schritt4", "kopfId": "", "titel": "Process step 4", "untertitel": "", "punkteUeberschrift": "This includes:", "punkte": [{ "text": "" }], "beschreibung": [] }

    "A": "Decision responsibility (Accountable)",
    "C": "Contribution responsibility (Consulted)",
    "I": "Right to be informed (Informed)"
  }
};

const RACI_REIHENFOLGE = ["R", "A", "C", "I"];   /* Legende-Reihenfolge */
const SLOT_REIHENFOLGE = ["C", "R", "A", "I"];   /* feste Plätze im RACI-Feld */
const SVG_NS = "http://www.w3.org/2000/svg";

/* Rollen-Helfer (Phase A2 — stabile IDs): tolerant für altes (String) und neues
   ({id,name}) Rollen-Format. Anzeige = Name, RACI-Schlüssel = id. Siehe shared/js/prozess.js. */
function rName(r) { return NIJU.PROZESS.rolleName(r); }
function rId(r)   { return NIJU.PROZESS.rolleId(r); }

/* Zentraler Zustand: die aktuell bearbeiteten Daten + Editor-Modus + Ansicht.
   ansicht: "uebersicht" | "detail"; detailIndex = angezeigter Schritt im Detail. */
const STATE = { daten: null, bearbeiten: false, zuKlappen: {}, ansicht: "uebersicht", detailIndex: 0 };

function tiefKopie(obj) { return JSON.parse(JSON.stringify(obj)); }

/* Daten setzen = Vorschau rendern und (falls offen) Editor neu aufbauen. */
function setDaten(daten) {
  STATE.daten = daten;
  render(STATE.daten);
  if (STATE.bearbeiten) baueEditor();
}

/* ---------- kleine Helfer ---------- */
function el(tag, klasse, text) {
  const e = document.createElement(tag);
  if (klasse) e.className = klasse;
  if (text !== undefined && text !== null) e.textContent = text;
  return e;
}
/* Im Badge angezeigter Text je RACI-Buchstabe (aus dem aktiven/Prozess-Design;
   Fallback = Buchstabe selbst). So lassen sich die Badges im Design umbenennen. */
function raciLabel(b) { return (window.NIJU && NIJU.DESIGN && NIJU.DESIGN.labelFor) ? NIJU.DESIGN.labelFor(b) : b; }
function badge(buchstabe) { return el("span", "badge badge-" + buchstabe, raciLabel(buchstabe)); }

/* "Input [Verantwortlich]" -> "INPUT / VERANTWORTLICH" */
function labelFormat(text) {
  return (text || "").toUpperCase().replace(/\s*\[/, " / ").replace(/\]/g, "");
}
/* "Unternehmensstrategie [CEO]" -> {text, tag} */
function tagSplit(s) {
  const m = String(s).match(/^(.*?)\s*\[([^\]]+)\]\s*$/);
  if (m) return { text: m[1], tag: m[2] };
  return { text: String(s), tag: null };
}
/* "Konzeptverantwortung (Responsible)" -> {titel:"Responsible", sub:"Konzeptverantwortung"} */
function legendeTeile(text) {
  const m = String(text).match(/^(.*?)\s*\(([^)]+)\)\s*$/);
  if (m) return { sub: m[1], titel: m[2] };
  return { sub: text, titel: "" };
}
/* "1.4.3 Organisationsentwicklung" -> {num:"1.4.3", name:"Organisationsentwicklung"} */
function prozessIdTeile(text) {
  const m = String(text || "").match(/^\s*([\d.]+)\s+(.*)$/);
  if (m) return { num: m[1], name: m[2] };
  return { num: "", name: String(text || "") };
}
/* Sichere Rich-Text-Ausgabe (Detailseite): HTML escapen, **fett** zulassen */
function richHTML(s) {
  const esc = String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  return esc.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
}

/* Firma oben rechts in der Kopfzeile: als Text-Chip oder als Logo-Bild.
   meta.firmaModus = "text" | "logo"; meta.logo = Data-URL (PNG/JPEG). */
function firmaElement(m) {
  if (m.firmaModus === "logo" && m.logo) {
    const img = el("img", "firma-logo");
    img.src = m.logo;
    img.alt = m.firma || "Logo";
    return img;
  }
  if (m.firma) return el("span", "chip", m.firma);
  return null;
}

/* Aufzählung für die dunkle Meta-Seitenleiste (mit [Tag]-Unterzeile) */
function metaListe(punkte) {
  const ul = el("ul", "mliste");
  (punkte || []).forEach(p => {
    const { text, tag } = tagSplit(typeof p === "string" ? p : (p.text || ""));
    const li = el("li");
    li.appendChild(el("span", "mtext", text));
    if (tag) li.appendChild(el("span", "mtag", tag));
    ul.appendChild(li);
  });
  return ul;
}

/* Aufzählung für Schritt-Inhalt (mit optionalen Unterpunkten) */
function punkteListe(punkte) {
  const ul = el("ul", "liste");
  (punkte || []).forEach(p => {
    const li = el("li");
    const text = (typeof p === "string") ? p : (p.text || "");
    li.appendChild(el("span", "txt", text));
    const unter = (typeof p === "object" && p.unterpunkte) ? p.unterpunkte : null;
    if (unter && unter.length) {
      const subUl = el("ul");
      unter.forEach(u => subUl.appendChild(el("li", null, u)));
      li.appendChild(subUl);
    }
    ul.appendChild(li);
  });
  return ul;
}

/* ---- Schritt-Inhalt: flexibles Block-Modell (Phase B) ----------------------
   Ein Schritt hat eine geordnete Block-Folge `bloecke[]`:
     { typ:"liste", stil:"eckig", ueberschrift?, punkte:[{text,unterpunkte?}] }
     { typ:"absatz", text }
   Das alte Modell (punkteUeberschrift + punkte) wird beim Laden migriert.
   `schrittBloecke` liest beide Modelle (Fallback, ohne zu mutieren) — so
   funktionieren Renderer/Export auch ohne vorherige Migration. -------------- */
function schrittBloecke(s) {
  if (s && Array.isArray(s.bloecke)) return s.bloecke;
  return [{ typ: "liste", stil: "eckig", ueberschrift: (s && s.punkteUeberschrift) || "", punkte: (s && s.punkte) || [] }];
}
function normalisiereSchritte(daten) {
  ((daten && daten.schritte) || []).forEach(s => {
    if (Array.isArray(s.bloecke)) return;            /* schon migriert */
    const bl = [];
    if ((s.punkteUeberschrift && String(s.punkteUeberschrift).trim()) || (s.punkte && s.punkte.length)) {
      bl.push({ typ: "liste", stil: "eckig", ueberschrift: s.punkteUeberschrift || "", punkte: s.punkte || [] });
    }
    s.bloecke = bl;
    delete s.punkteUeberschrift; delete s.punkte;    /* eine Quelle der Wahrheit */
  });
  return daten;
}
/* RACI-Werte robust normalisieren: jede belegte Zelle wird zu einem Array
   gültiger, eindeutiger, kanonisch sortierter Buchstaben. Schützt vor von Hand
   geschriebenen JSONs mit String-Werten ("A" statt ["A"]) oder Mehrbuchstaben-
   Strings ("CI"): die rendern zwar (.includes greift auf Strings), würden aber
   beim ersten Klick auf eine Matrix-Zelle crashen, weil toggleRaci() .slice()/
   .push() auf einem String aufruft. Idempotent; persistiert beim Speichern
   automatisch saubere Arrays in die Datei. */
function normalisiereRaci(daten) {
  const raci = daten && daten.raci;
  if (!raci || typeof raci !== "object") return daten;
  Object.keys(raci).forEach(sid => {
    const zeile = raci[sid];
    if (!zeile || typeof zeile !== "object") { delete raci[sid]; return; }
    Object.keys(zeile).forEach(rolle => {
      const roh = zeile[rolle];
      if (roh == null) { delete zeile[rolle]; return; }
      const flach = (Array.isArray(roh) ? roh.join("") : String(roh)).toUpperCase();
      const arr = RACI_REIHENFOLGE.filter(b => flach.indexOf(b) >= 0);
      if (arr.length) zeile[rolle] = arr; else delete zeile[rolle];
    });
  });
  return daten;
}

/* ============================================================
   Render-Dispatcher: wählt Übersicht oder Detailseite
   ============================================================ */
function render(daten) {
  normalisiereSchritte(daten);
  NIJU.PROZESS.migriere(daten);   /* Rollen auf {id,name} + raci auf id-Schlüssel (idempotent) */
  normalisiereRaci(daten);
  const blatt = document.getElementById("blatt");
  if (window.NIJU.DESIGN) window.NIJU.DESIGN.applyForProcess(daten);
  blatt.classList.toggle("detail", STATE.ansicht === "detail");
  if (STATE.ansicht === "detail") renderDetail(daten);
  else renderUebersicht(daten);
  aktualisiereSchrittWahl();
}

/* ============================================================
   Render-Funktion: Prozessübersicht (A3 quer)
   ============================================================ */
function renderUebersicht(daten) {
  const blatt = document.getElementById("blatt");
  blatt.innerHTML = "";
  blatt.classList.toggle("bearbeiten", STATE.bearbeiten);
  if (!daten || !daten.meta) {
    blatt.innerHTML = '<div class="leer-hinweis"></div>'; blatt.firstChild.textContent = t("msg.invalidData");
    return;
  }

  const m = daten.meta;
  const schritte = daten.schritte || [];
  const rollen = daten.rollen || [];
  const n = schritte.length;
  const versStand = "VERSION " + " "; // Platzhalter (wird unten zusammengebaut)

  /* ----- Eyebrow / Top-Strip ----- */
  const topbar = el("div", "topbar");
  const tbl = el("div", "tb-l");
  tbl.appendChild(document.createTextNode(t("render.processMap") + " "));
  if (m.firma) { tbl.appendChild(document.createTextNode("/ ")); tbl.appendChild(el("span", "ak", m.firma)); }
  topbar.appendChild(tbl);
  const tbr = el("div", "tb-r");
  const firmaEl = firmaElement(m);   /* Firma oben rechts: Text-Chip oder Logo */
  if (firmaEl) tbr.appendChild(firmaEl);
  topbar.appendChild(tbr);
  blatt.appendChild(topbar);

  /* ----- Titel (zweifarbig: vor "-" fett, danach hell) ----- */
  const titelWrap = el("div", "titel");
  const h1 = el("h1");
  const teile = (m.titel || "").split(/\s[-–]\s/);
  h1.appendChild(el("span", "t1", teile[0] || ""));
  if (teile.length > 1) { h1.appendChild(document.createTextNode(" ")); h1.appendChild(el("span", "t2", teile.slice(1).join(" – "))); }
  titelWrap.appendChild(h1);
  blatt.appendChild(titelWrap);

  /* ----- Raster ----- */
  const raster = el("div", "raster");
  raster.style.gridTemplateColumns = "minmax(205px, 1.12fr) repeat(" + n + ", 1fr)";

  /* Dunkles Meta-Panel: ein Block über Band 1 + 2 (grid-row 1/3).
     Vier Gruppen werden über die volle Höhe gleichmäßig verteilt. */
  const meta = el("div", "zelle meta");
  meta.style.gridColumn = "1";
  meta.style.gridRow = "1 / span 2";
  const mgruppe = (bauen) => { const g = el("div", "mgroup"); bauen(g); meta.appendChild(g); };
  mgruppe(g => {
    g.appendChild(el("div", "mlabel", t("field.processId")));
    g.appendChild(el("div", "mval-id", m.prozessId || "—"));
  });
  mgruppe(g => {
    g.appendChild(el("div", "mlabel", t("field.processOwner")));
    g.appendChild(el("div", "mval", m.processOwner || "—"));
  });
  if (daten.input) mgruppe(g => {
    g.appendChild(el("div", "mlabel", labelFormat(daten.input.label || t("field.input"))));
    g.appendChild(metaListe(daten.input.punkte));
  });
  if (daten.output) mgruppe(g => {
    g.appendChild(el("div", "mlabel", labelFormat(daten.output.label || t("field.output"))));
    if (daten.output.verantwortlich) g.appendChild(el("div", "mval akzent", daten.output.verantwortlich));
    g.appendChild(metaListe(daten.output.punkte));
  });
  raster.appendChild(meta);

  /* Band 1: Schritt-Köpfe (Zeile 1) */
  schritte.forEach((s, i) => {
    const k = el("div", "zelle schritt-kopf");
    k.style.gridColumn = String(i + 2);
    k.style.gridRow = "1";
    const top = el("div", "sk-top");
    /* Spaltenkopf-ID (frei wählbar). Ohne ID beginnt der Titel linksbündig. */
    if (s.kopfId) top.appendChild(el("span", "sk-num", s.kopfId));
    top.appendChild(el("span", "sk-lab", (s.titel || "").toUpperCase()));
    k.appendChild(top);
    if (s.untertitel) k.appendChild(el("div", "sk-sub", s.untertitel));
    raster.appendChild(k);
  });

  /* Band 2: Schritt-Inhalte (Zeile 2) */
  schritte.forEach((s, i) => {
    const c = el("div", "zelle schritt-inhalt");
    c.style.gridColumn = String(i + 2);
    c.style.gridRow = "2";
    schrittBloecke(s).forEach(block => {
      const bd = el("div", "si-block");
      if (block.typ === "absatz") {
        const p = el("div", "si-absatz"); p.innerHTML = richHTML(block.text || ""); bd.appendChild(p);
      } else {
        if (block.ueberschrift) bd.appendChild(el("div", "si-lab", block.ueberschrift));
        bd.appendChild(punkteListe(block.punkte));
      }
      c.appendChild(bd);
    });
    raster.appendChild(c);
  });

  /* ----- RACI: Kopf mit Titel + Legende (volle Breite) ----- */
  const rhead = el("div", "raci-head");
  const rht = el("div");
  rht.appendChild(el("div", "rh-titel", t("render.raciTitle")));
  rht.appendChild(el("span", "rh-sub", t("render.raciSub")));
  rhead.appendChild(rht);
  const legende = el("div", "legende");
  const leg = daten.legende || {};
  RACI_REIHENFOLGE.forEach(b => {
    if (!leg[b]) return;
    const t = legendeTeile(leg[b]);
    const item = el("div", "leg-item");
    item.appendChild(badge(b));
    const txt = el("div", "leg-txt");
    txt.appendChild(el("b", null, t.titel || raciLabel(b)));
    if (t.sub) txt.appendChild(el("i", null, t.sub));
    item.appendChild(txt);
    legende.appendChild(item);
  });
  rhead.appendChild(legende);
  raster.appendChild(rhead);

  /* ----- RACI: Spaltenkopf (00–04) ----- */
  raster.appendChild(el("div", "raci-corner"));
  schritte.forEach((s, i) => {
    const c = el("div", "raci-num");
    if (s.kopfId) c.appendChild(el("span", "rn-num", s.kopfId));
    c.appendChild(el("span", "rn-lab", (s.titel || "").toUpperCase()));
    raster.appendChild(c);
  });

  /* ----- RACI: Matrix-Zeilen ----- */
  rollen.forEach((rolle, ri) => {
    const stripe = "rrow-" + (ri % 2);
    raster.appendChild(el("div", "raci-rolle " + stripe, rName(rolle)));
    schritte.forEach(s => {
      const zelle = el("div", "raci-zelle " + stripe);
      const eintrag = (daten.raci && daten.raci[s.id]) ? daten.raci[s.id][rId(rolle)] : null;
      if (eintrag && eintrag.length) {
        SLOT_REIHENFOLGE.forEach(b => {
          if (eintrag.includes(b)) {
            const bel = badge(b);
            bel.classList.add("slot-" + b);
            bel.dataset.step = s.id;
            bel.dataset.letter = b;
            zelle.appendChild(bel);
          }
        });
      }
      if (STATE.bearbeiten) {
        zelle.classList.add("editierbar");
        zelle.title = t("raci.clickHint");
        zelle.addEventListener("click", (ev) => { ev.stopPropagation(); oeffneRaciMenu(zelle, s.id, rId(rolle)); });
      }
      raster.appendChild(zelle);
    });
  });

  blatt.appendChild(raster);

  /* ----- Fuß ----- */
  const footer = el("div", "footer");
  footer.appendChild(el("div", "f-l", m.fusstext || ""));
  const fr = el("div", "f-r");
  if (m.version) { fr.appendChild(document.createTextNode(t("render.version") + " ")); fr.appendChild(el("b", null, m.version)); }
  if (m.datum)   fr.appendChild(document.createTextNode("  /  " + t("render.asOf") + " " + m.datum));

/* ----- Verbinder für die Übersicht (alle Schritt-Spalten) ----- */
function zeichneVerbinderUebersicht() {
  const blatt = document.getElementById("blatt");
  if (!blatt) return;
  /* Während der Messung das transform:scale neutralisieren, damit
     getBoundingClientRect natürliche (unskalierte) Koordinaten liefert. */
  const altTransform = blatt.style.transform;
  blatt.style.transform = "none";

  let svg = document.getElementById("verbinder");
  if (!svg) { svg = document.createElementNS(SVG_NS, "svg"); svg.id = "verbinder"; blatt.appendChild(svg); }
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const bRect = blatt.getBoundingClientRect();
  const w = blatt.clientWidth, h = blatt.clientHeight;
  svg.setAttribute("viewBox", "0 0 " + w + " " + h);
  svg.setAttribute("preserveAspectRatio", "none");

  function linie(x1, y1, x2, y2) {
    const l = document.createElementNS(SVG_NS, "line");
    l.setAttribute("x1", x1); l.setAttribute("y1", y1);
    l.setAttribute("x2", x2); l.setAttribute("y2", y2);
    svg.appendChild(l);
  }
  function elbow(x1, y1, x2, y2) {
    if (Math.abs(y1 - y2) < 0.5) { linie(x1, y1, x2, y2); return; }
    const xm = (x1 + x2) / 2;
    linie(x1, y1, xm, y1); linie(xm, y1, xm, y2); linie(xm, y2, x2, y2);
  }
  const zentrum = (b) => {
    const r = b.getBoundingClientRect();
    return { x: r.left + r.width / 2 - bRect.left, y: r.top + r.height / 2 - bRect.top };
  };

  const proSchritt = {};
  Array.from(blatt.querySelectorAll(".raci-zelle .badge")).forEach(b => {
    (proSchritt[b.dataset.step] = proSchritt[b.dataset.step] || []).push(b);
  });

  Object.keys(proSchritt).forEach(stepId => {
    const cs = [], is = []; let R = null, A = null;
    proSchritt[stepId].forEach(b => {
      const p = zentrum(b), L = b.dataset.letter;
      if (L === "C") cs.push(p); else if (L === "I") is.push(p);
      else if (L === "R") R = p; else if (L === "A") A = p;
    });
    cs.sort((a, b) => a.y - b.y); is.sort((a, b) => a.y - b.y);
    const xC = cs.length ? cs[0].x : null;
    const xI = is.length ? is[0].x : null;
    const cExtra = [], iExtra = [];

    let prev = null;
    if (xC != null) prev = { kind: "col", x: xC, extra: cExtra };
    if (R) {
      if (prev && prev.kind === "col") { linie(prev.x, R.y, R.x, R.y); prev.extra.push(R.y); }
      prev = { kind: "pt", x: R.x, y: R.y };
    }
    if (A) {
      if (prev && prev.kind === "pt") elbow(prev.x, prev.y, A.x, A.y);
      else if (prev && prev.kind === "col") { linie(prev.x, A.y, A.x, A.y); prev.extra.push(A.y); }
      prev = { kind: "pt", x: A.x, y: A.y };
    }
    if (xI != null) {
      if (prev && prev.kind === "pt") { linie(prev.x, prev.y, xI, prev.y); iExtra.push(prev.y); }
      else if (prev && prev.kind === "col") { const y = cs[0].y; linie(prev.x, y, xI, y); iExtra.push(y); prev.extra.push(y); }
    }

    function vert(items, x, extra) {
      if (x == null) return;
      const ys = items.map(p => p.y).concat(extra);
      if (ys.length < 2) return;
      const y1 = Math.min.apply(null, ys), y2 = Math.max.apply(null, ys);
      if (y2 - y1 > 0.5) linie(x, y1, x, y2);
    }
    vert(cs, xC, cExtra);
    vert(is, xI, iExtra);
  });

  blatt.style.transform = altTransform;
}

/* ============================================================
   Bildschirm-Einpassung (komplett sichtbar, kein Scrollen)
   Skalierung über transform:scale + Hülle, die die skalierte
   Größe einnimmt. Das SVG der Verbinder skaliert 1:1 mit.
   ============================================================ */
function passeBildschirmEin() {
  const blatt = document.getElementById("blatt");
  const wrap  = document.getElementById("blattWrap");
  if (!blatt || !wrap) return;
  const buehne = document.querySelector(".buehne");
  const stil = getComputedStyle(buehne);
  const padX = parseFloat(stil.paddingLeft) + parseFloat(stil.paddingRight);
  const padY = parseFloat(stil.paddingTop) + parseFloat(stil.paddingBottom);
  /* Verfügbarer Platz = innere Maße der Bühne (berücksichtigt das Editor-Panel
     automatisch, da die Bühne der Flex-Rest ist). */
  const verfBreite = buehne.clientWidth - padX;
  const verfHoehe  = buehne.clientHeight - padY;

  blatt.style.transform = "none";              // natürliche Maße messen
  const w = blatt.offsetWidth, h = blatt.offsetHeight;
  let skala = Math.min(verfBreite / w, verfHoehe / h, 1);
  if (!(skala > 0)) skala = 1;

  blatt.style.transform = "scale(" + skala + ")";
  wrap.style.width  = (w * skala) + "px";
  wrap.style.height = (h * skala) + "px";
}

let _einpassTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(_einpassTimer);
  _einpassTimer = setTimeout(passeBildschirmEin, 120);
});

/* ----- DOM-Helfer für Formularfelder ----- */
function feld(label, wert, onChange, opts) {

function knopf(text, klasse, onClick, titel) {

/* ============================================================
   Editor redesign — shared building blocks (detail-page editor).
   Local icons, hover-reveal icon buttons, popover menus, collapse
   view-state, keyboard-driven list editing. All offline, no deps.
   ============================================================ */
const SVG_NS_ED = "http://www.w3.org/2000/svg";
/* Local SVG icon, referencing the inline sprite at the top of <body>. */
function ic(name) {
  const svg = document.createElementNS(SVG_NS_ED, "svg");
  svg.setAttribute("class", "ic"); svg.setAttribute("aria-hidden", "true");
  const use = document.createElementNS(SVG_NS_ED, "use");
  use.setAttribute("href", "#" + name);
  svg.appendChild(use);
  return svg;
}
function setIc(host, name) { const u = host.querySelector("use"); if (u) u.setAttribute("href", "#" + name); }
/* 28x28 icon button. label → aria-label + title (a11y §6).
   opts: { reveal:hover-reveal, grip:drag handle, klasse, disabled }. */
function iconBtn(name, label, onClick, opts) {
  opts = opts || {};
  const b = document.createElement("button");
  b.type = "button";
  b.className = "ed-iconbtn" + (opts.reveal ? " ed-reveal" : "") + (opts.grip ? " ed-grip" : "") + (opts.klasse ? " " + opts.klasse : "");
  b.setAttribute("aria-label", label); b.title = label;
  b.appendChild(ic(name));
  if (opts.disabled) b.disabled = true;
  if (onClick) b.addEventListener("click", function (e) { e.preventDefault(); e.stopPropagation(); onClick(e); });
  return b;
}

/* ----- Popover menu (⋯ overflow, + block). Plain positioned div, closes on
   outside-click / Esc. items: { icon, label, onClick, disabled } or "-". ----- */
let _edPop = null;
function _edPopAussen(e) { if (_edPop && !_edPop.contains(e.target)) schliessePop(); }
function _edPopTaste(e) { if (e.key === "Escape") schliessePop(); }
function schliessePop() {
  if (_edPop) { _edPop.remove(); _edPop = null; }
  document.removeEventListener("mousedown", _edPopAussen, true);
  document.removeEventListener("keydown", _edPopTaste, true);
}
function oeffnePop(anchor, items) {
  schliessePop();
  const pop = el("div", "ed-pop");
  items.forEach(function (it) {
    if (it === "-") { pop.appendChild(document.createElement("hr")); return; }
    const b = document.createElement("button"); b.type = "button";
    b.appendChild(ic(it.icon || "ic-dots-vertical"));
    b.appendChild(el("span", null, it.label));
    if (it.disabled) b.disabled = true;
    else b.addEventListener("click", function (e) { e.preventDefault(); e.stopPropagation(); schliessePop(); it.onClick(); });
    pop.appendChild(b);
  });
  document.body.appendChild(pop);
  pop.style.position = "fixed";
  const r = anchor.getBoundingClientRect();
  let left = r.right - pop.offsetWidth, top = r.bottom + 4;
  if (left < 6) left = 6;
  if (top + pop.offsetHeight > window.innerHeight - 6) top = r.top - pop.offsetHeight - 4;
  pop.style.left = Math.round(left) + "px";
  pop.style.top = Math.round(Math.max(6, top)) + "px";
  _edPop = pop;
  setTimeout(function () {
    document.addEventListener("mousedown", _edPopAussen, true);
    document.addEventListener("keydown", _edPopTaste, true);
  }, 0);
}

/* ----- Collapse view-state — NEVER written to the JSON (§4). WeakMap keyed by
   the (stable) description-block object → Set of collapsed content-part indices.
   Toggling only flips a CSS class (no rebuild), so the index stays valid. ----- */
const ED_COLLAPSE = new WeakMap();
function istZu(block, ti) { const s = ED_COLLAPSE.get(block); return !!(s && s.has(ti)); }
function setZu(block, ti, zu) {
  let s = ED_COLLAPSE.get(block);
  if (!s) { s = new Set(); ED_COLLAPSE.set(block, s); }
  if (zu) s.add(ti); else s.delete(ti);
}

/* Read a list item's text whether it is a plain string or { text, unterpunkte }. */
function itemText(li) { return (typeof li === "object" && li) ? (li.text || "") : (li || ""); }
function klonTeil(teil) { return (typeof teil === "object" && teil) ? JSON.parse(JSON.stringify(teil)) : teil; }
/* Collapsed one-line summary of a content part (§5.1). */
function blockKurz(teil) {
  if (typeof teil === "string") {
    const s = teil.trim().replace(/\s+/g, " ");
    return s ? (s.length > 60 ? s.slice(0, 60) + "…" : s) : t("editor.paragraph");
  }
  if (teil && teil.liste) {
    const n = teil.liste.length;
    const f = n ? String(itemText(teil.liste[0])).trim().replace(/\s+/g, " ") : "";
    return f ? (f + (n > 1 ? "  ·  +" + (n - 1) : "")) : t("editor.list");
  }
  return "";
}
/* Auto-grow textarea (§5.9): height = content. */
function autoGrow(ta) { ta.style.height = "auto"; ta.style.height = ta.scrollHeight + "px"; }

/* 2-column segment toggle for a list part (§5.8) — same data effect as before. */
function segmentToggle(teil) {
  const seg = el("div", "ed-seg"); seg.setAttribute("role", "group");
  [["2", 2], ["1", 1]].forEach(function (o) {

    if ((teil.spalten === 2 ? 2 : 1) === o[1]) b.classList.add("an");

      b.classList.add("an");

/* ----- Keyboard model focus restoration across editor rebuilds (§5.5).
   List inputs carry data-listid/lii/ui; after a structural change we re-focus the
   intended cell. `listid` identifies the point-list (detail: "d:<bi>:<ti>",
   overview: "o:<si>"); ui = "x" for a top-level item, a number for a sub-point. ----- */
let _edFokus = null;
function nachFokus(tok) { _edFokus = tok; nachStruktur(); stelleFokusHer(); }
function stelleFokusHer() {
  if (!_edFokus) return;
  const f = _edFokus; _edFokus = null;
  const ui = (f.ui == null) ? "x" : f.ui;
  const inp = document.querySelector('#editor input[data-listid="' + f.listid + '"][data-lii="' + f.lii + '"][data-ui="' + ui + '"]');
  if (inp) { inp.focus(); const p = (f.caret == null) ? inp.value.length : f.caret; try { inp.setSelectionRange(p, p); } catch (e) {} }
}
/* The row visually above (lii,ui) — for Backspace focus handoff. */
function vorigeZeile(liste, lii, ui) {
  if (ui != null) return (ui > 0) ? { lii: lii, ui: ui - 1 } : { lii: lii, ui: "x" };
  if (lii === 0) return null;
  const prev = liste[lii - 1];
  const subs = (typeof prev === "object" && prev && prev.unterpunkte) ? prev.unterpunkte : null;
  return subs && subs.length ? { lii: lii - 1, ui: subs.length - 1 } : { lii: lii - 1, ui: "x" };
}

/* Move an array entry from index `from` to insertion index `to` (both on the
   original array). Shared by drag-reorder and the ⋯ menu. */
function arrVerschieben(arr, from, to) {
  if (from < 0 || from >= arr.length) return;
  const it = arr.splice(from, 1)[0];
  if (from < to) to--;
  if (to < 0) to = 0; if (to > arr.length) to = arr.length;
  arr.splice(to, 0, it);
}

/* ----- Drag-reorder via the grip (HTML5 native DnD, file://-safe, §5.4).
   The grip flips draggable on while pressed; drops only land inside the same
   sibling group (`gruppe`); a thin --akzent line marks the insertion point.
   reorder(from, to) mutates the array and re-renders. ----- */
let _edDrag = null;
function _edDropPutzen() {
  Array.prototype.forEach.call(document.querySelectorAll(".ed-drop-before,.ed-drop-after"),
    function (x) { x.classList.remove("ed-drop-before", "ed-drop-after"); });
}
function dragWire(grip, itemEl, gruppe, index, reorder) {
  grip.addEventListener("pointerdown", function () { itemEl.draggable = true; });
  grip.addEventListener("pointerup", function () { itemEl.draggable = false; });
  itemEl.addEventListener("dragstart", function (e) {
    if (!itemEl.draggable) { e.preventDefault(); return; }
    _edDrag = { gruppe: gruppe, von: index, reorder: reorder };
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", String(index)); } catch (_) {}
    setTimeout(function () { itemEl.classList.add("ed-dragging"); }, 0);
  });
  itemEl.addEventListener("dragend", function () {
    itemEl.draggable = false; itemEl.classList.remove("ed-dragging"); _edDropPutzen(); _edDrag = null;
  });
  itemEl.addEventListener("dragover", function (e) {
    if (!_edDrag || _edDrag.gruppe !== gruppe) return;
    e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = "move";
    const r = itemEl.getBoundingClientRect(); const after = (e.clientY - r.top) > r.height / 2;
    _edDropPutzen();
    itemEl.classList.add(after ? "ed-drop-after" : "ed-drop-before");
  });
  itemEl.addEventListener("drop", function (e) {
    if (!_edDrag || _edDrag.gruppe !== gruppe) return;
    e.preventDefault(); e.stopPropagation();
    const r = itemEl.getBoundingClientRect(); const after = (e.clientY - r.top) > r.height / 2;
    const von = _edDrag.von, ziel = index + (after ? 1 : 0), reord = _edDrag.reorder;
    _edDropPutzen(); _edDrag = null;
    if (von !== ziel) reord(von, ziel);
  });
}

/* aufklappbarer Abschnitt */

  return sec;
}

/* Editor für eine einfache String-Liste (Input-/Output-Punkte) */
function stringListe(arr, addLabel, gruppe) {
  const wrap = el("div");
  arr.forEach(function (s, i) {
    const row = el("div", "ed-row");
    const inp = document.createElement("input");
    inp.type = "text"; inp.className = "grow"; inp.value = s || "";

    row.appendChild(inp);
    const tools = el("div", "ed-tools");
    const grip = iconBtn("ic-grip", t("editor.dragMove"), null, { reveal: true, grip: true });
    tools.appendChild(grip);
    /* unique group per list ("str:input"/"str:output") so items never cross lists */
    dragWire(grip, row, "str:" + (gruppe || "x"), i, function (from, to) { arrVerschieben(arr, from, to); nachStruktur(); });
    tools.appendChild(iconBtn("ic-trash", t("editor.remove"), function () { arr.splice(i, 1); nachStruktur(); }, { reveal: true }));
    row.appendChild(tools);
    wrap.appendChild(row);
  });

  ghost.appendChild(ic("ic-plus")); ghost.appendChild(el("span", null, addLabel));
  ghost.addEventListener("click", function (e) { e.preventDefault(); arr.push(""); nachStruktur(); });

/* Editor für die Aufzählungspunkte (inkl. Unterpunkten) EINES Listen-Blocks.
   Phase-B-Glue: arbeitet auf block.punkte (erster Listen-Block des Schritts).
   Der volle Block-Editor (mehrere Blöcke, Drag&Drop) folgt in Phase C. */
/* Collapsed one-line summary of an overview content block (list | paragraph). */
function bloeckeKurz(block) {
  if (block.typ === "absatz") {
    const s = String(block.text || "").trim().replace(/\s+/g, " ");
    return s ? (s.length > 60 ? s.slice(0, 60) + "…" : s) : t("editor.paragraph");
  }
  const head = String(block.ueberschrift || "").trim();
  if (head) return head;
  const n = (block.punkte || []).length;
  const f = n ? String(itemText(block.punkte[0])).trim().replace(/\s+/g, " ") : "";
  return f ? (f + (n > 1 ? "  ·  +" + (n - 1) : "")) : t("editor.list");
}

/* Overview: full block editor for a step's content (schritt.bloecke[] — list
   blocks with a heading + points, or paragraph blocks). Mirrors the detail page's
   inhaltEditor: collapsible block headers, hover-reveal tools, drag, the shared
   keyboard list model, and one "+ Add block" menu (§5.1/§5.6). */
function bloeckeEditor(schritt, si) {
  const wrap = el("div");
  if (!Array.isArray(schritt.bloecke)) schritt.bloecke = schrittBloecke(schritt);
  schritt.bloecke.forEach(function (block, ti) {
    const istListe = (block.typ !== "absatz");
    const bl = el("div", "ed-block"); if (istZu(schritt, ti)) bl.classList.add("zu");

    const h = el("div", "ed-block-h");
    const chev = iconBtn(istZu(schritt, ti) ? "ic-chevron-right" : "ic-chevron-down", t("editor.collapse"), null, { klasse: "ed-chev" });
    chev.addEventListener("click", function (e) {
      e.preventDefault(); e.stopPropagation();
      const zu = !bl.classList.contains("zu");
      bl.classList.toggle("zu", zu); setZu(schritt, ti, zu); setIc(chev, zu ? "ic-chevron-right" : "ic-chevron-down");
    });
    h.appendChild(chev);
    h.appendChild(el("span", "ed-typebadge", istListe ? t("editor.list") : t("editor.paragraph")));
    h.appendChild(el("span", "ed-block-sum", bloeckeKurz(block)));
    const gripB = iconBtn("ic-grip", t("editor.dragMove"), null, { reveal: true, grip: true });
    h.appendChild(gripB);
    dragWire(gripB, bl, "bl:" + si, ti, function (from, to) { arrVerschieben(schritt.bloecke, from, to); nachStruktur(); });
    const moreB = iconBtn("ic-dots-vertical", t("editor.more"), function () {
      oeffnePop(moreB, [
        { icon: "ic-duplicate", label: t("editor.duplicate"), onClick: function () { schritt.bloecke.splice(ti + 1, 0, JSON.parse(JSON.stringify(block))); nachStruktur(); } },
        { icon: "ic-arrow-up", label: t("editor.moveUp"), disabled: ti === 0, onClick: function () { arrVerschieben(schritt.bloecke, ti, ti - 1); nachStruktur(); } },
        { icon: "ic-arrow-down", label: t("editor.moveDown"), disabled: ti === schritt.bloecke.length - 1, onClick: function () { arrVerschieben(schritt.bloecke, ti, ti + 2); nachStruktur(); } },
        "-",
        { icon: "ic-trash", label: t("editor.remove"), onClick: function () { schritt.bloecke.splice(ti, 1); nachStruktur(); } }
      ]);
    }, { reveal: true });
    h.appendChild(moreB);
    bl.appendChild(h);

    const body = el("div", "ed-block-body");
    if (istListe) {
      if (!Array.isArray(block.punkte)) block.punkte = [];
      body.appendChild(feld(t("editor.listHeading"), block.ueberschrift, function (v) {
        block.ueberschrift = v; const sum = h.querySelector(".ed-block-sum"); if (sum) sum.textContent = bloeckeKurz(block); render(STATE.daten);
      }));
      listenKoerper(body, block.punkte, "o:" + si + ":" + ti);
    } else {
      const ta = document.createElement("textarea");
      ta.className = "grow ed-grow"; ta.value = block.text || ""; ta.rows = 2;
      ta.addEventListener("input", function () {
        block.text = ta.value; autoGrow(ta);

        render(STATE.daten);
      });
      body.appendChild(ta);
      requestAnimationFrame(function () { autoGrow(ta); });
    }
    bl.appendChild(body);
    wrap.appendChild(bl);
  });

  const add = el("button", "ed-ghost"); add.type = "button";
  add.appendChild(ic("ic-plus"));
  add.appendChild(el("span", null, t("editor.addContentBlock")));
  const chv = ic("ic-chevron-down"); chv.style.marginLeft = "auto"; add.appendChild(chv);
  add.addEventListener("click", function (e) {
    e.preventDefault();
    oeffnePop(add, [
      { icon: "ic-paragraph", label: t("editor.paragraph"), onClick: function () { schritt.bloecke.push({ typ: "absatz", text: "" }); nachStruktur(); } },
      { icon: "ic-list", label: t("editor.list"), onClick: function () { schritt.bloecke.push({ typ: "liste", stil: "eckig", ueberschrift: "", punkte: [""] }); nachStruktur(); } },
      { icon: "ic-heading", label: t("editor.heading") + " (" + t("editor.blockSoon") + ")", disabled: true }
    ]);
  });
  wrap.appendChild(add);
  return wrap;
}

/* neue, eindeutige Schritt-ID */
function neueSchrittId(d) {
  const vorhanden = new Set((d.schritte || []).map(s => s.id));
  let i = 1, id;
  do { id = "schritt_" + Date.now().toString(36) + "_" + (i++); } while (vorhanden.has(id));
  return id;
}

  /* Fußzeile (Freitext unten links) */

   [2-col toggle][grip][⋯] (§5.1). Lists are edited with the keyboard model
   (§5.5); the three add-buttons collapse into one "+ Add block" menu (§5.6). */
function inhaltEditor(block, bi) {
  const wrap = el("div");
  if (!block.inhalt) block.inhalt = [];
  block.inhalt.forEach(function (teil, ti) {
    const istListe = (typeof teil === "object" && teil && teil.liste);

    chev.addEventListener("click", function (e) {
      e.preventDefault(); e.stopPropagation();
      const zu = !bl.classList.contains("zu");
      bl.classList.toggle("zu", zu); setZu(block, ti, zu); setIc(chev, zu ? "ic-chevron-right" : "ic-chevron-down");
    });
    h.appendChild(chev);
    h.appendChild(el("span", "ed-typebadge", istListe ? t("editor.list") : t("editor.paragraph")));
    h.appendChild(el("span", "ed-block-sum", blockKurz(teil)));
    if (istListe) h.appendChild(segmentToggle(teil));
    const gripB = iconBtn("ic-grip", t("editor.dragMove"), null, { reveal: true, grip: true });
    h.appendChild(gripB);
    dragWire(gripB, bl, "inh:" + bi, ti, function (from, to) { arrVerschieben(block.inhalt, from, to); nachStruktur(); });
    const moreB = iconBtn("ic-dots-vertical", t("editor.more"), function () {
      oeffnePop(moreB, [
        { icon: "ic-duplicate", label: t("editor.duplicate"), onClick: function () { block.inhalt.splice(ti + 1, 0, klonTeil(teil)); nachStruktur(); } },
        { icon: "ic-arrow-up", label: t("editor.moveUp"), disabled: ti === 0, onClick: function () { const a = block.inhalt, x = a[ti - 1]; a[ti - 1] = a[ti]; a[ti] = x; nachStruktur(); } },
        { icon: "ic-arrow-down", label: t("editor.moveDown"), disabled: ti === block.inhalt.length - 1, onClick: function () { const a = block.inhalt, x = a[ti + 1]; a[ti + 1] = a[ti]; a[ti] = x; nachStruktur(); } },
        "-",
        { icon: "ic-trash", label: t("editor.remove"), onClick: function () { block.inhalt.splice(ti, 1); nachStruktur(); } }
      ]);
    }, { reveal: true });
    h.appendChild(moreB);

    /* ---- body ---- */

    } else {
      const ta = document.createElement("textarea");
      ta.className = "grow ed-grow"; ta.value = (typeof teil === "string" ? teil : ""); ta.rows = 2;
      ta.addEventListener("input", function () {
        block.inhalt[ti] = ta.value; autoGrow(ta);

  add.addEventListener("click", function (e) {

      { icon: "ic-paragraph", label: t("editor.paragraph"), onClick: function () { block.inhalt.push(""); nachStruktur(); } },
      { icon: "ic-list", label: t("editor.list"), onClick: function () { block.inhalt.push({ liste: [""], spalten: 1 }); nachStruktur(); } },
